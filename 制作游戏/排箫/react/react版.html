<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #d3c8e0; font-family: sans-serif; overflow: hidden; }
        .step-container { transition: all 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState(0);
            const contentRef = useRef();

            // GSAP 动画：页面切换时淡入
            useEffect(() => {
                gsap.fromTo(contentRef.current, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 });
            }, [step]);

            const renderContent = () => {
                switch(step) {
                    case 0: return (
                        <div className="flex items-center gap-20">
                            <div className="w-80 h-60 bg-white/30 rounded-xl flex items-center justify-center">竹管堆图片</div>
                            <div>
                                <h2 className="text-2xl mb-6 text-gray-700">管的数量决定排箫的音域</h2>
                                <button className="block w-48 border border-white rounded-full py-2 mb-4 hover:bg-white/20">十八根</button>
                                <button className="block w-48 border border-white rounded-full py-2 hover:bg-white/20">二十一根</button>
                            </div>
                        </div>
                    );
                    case 1: return (
                        <div className="flex items-center gap-20">
                            <div className="w-80 h-60 bg-white/30 rounded-xl flex items-center justify-center">排箫实体图</div>
                            <div>
                                <p className="text-gray-600">烤直去青后，裁为长短不一的段</p>
                                <h2 className="text-2xl font-bold text-gray-800">长度决定共振的音高</h2>
                            </div>
                        </div>
                    );
                    case 2: return (
                        <div className="flex gap-10">
                            {['粘接', '捆绑', '框架'].map(item => (
                                <div key={item} className="w-32 h-32 rounded-full border border-white flex items-center justify-center cursor-pointer hover:bg-white/20">{item}</div>
                            ))}
                        </div>
                    );
                    case 3: return (
                        <div className="w-full flex flex-col items-center">
                            <div className="w-96 h-10 bg-white/40 mb-10 border border-white relative">
                                <div id="air" className="h-full bg-[#888] w-[50%] transition-all"></div>
                            </div>
                            <input type="range" className="w-96" onChange={(e) => gsap.to("#air", { width: e.target.value + '%' })} />
                        </div>
                    );
                }
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center">
                    {/* 进度点 */}
                    <div className="absolute top-12 flex gap-6">
                        {[0,1,2,3].map(i => (
                            <div key={i} className={`w-3 h-3 rounded-full ${i === step ? 'bg-[#d4a373]' : 'bg-[#b7a9c6]'}`}></div>
                        ))}
                    </div>

                    {/* 内容 */}
                    <div ref={contentRef} className="step-container">
                        {renderContent()}
                    </div>

                    {/* 按钮 */}
                    <button 
                        onClick={() => setStep(prev => Math.min(prev + 1, 3))}
                        className="absolute bottom-12 border px-8 py-2 rounded-full text-white border-white hover:bg-white/20"
                    >
                        下一步
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
