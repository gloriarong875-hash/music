<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>排箫制作流程</title>
    <style>
        :root {
            --bg-color: #d3c8e0;
            --dot-active: #d4a373;
            --dot-inactive: #b7a9c6;
            --text-color: #666;
        }
        body { margin: 0; background: var(--bg-color); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 导航点 */
        .nav-dots { position: absolute; top: 5%; display: flex; gap: 30px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--dot-inactive); }
        .dot.active { background: var(--dot-active); }

        /* 内容区容器 */
        #main-container { width: 80%; height: 70%; position: relative; display: flex; align-items: center; }

        /* 步骤内容 */
        .step-content { width: 100%; display: none; }
        .step-content.active { display: flex; align-items: center; justify-content: space-around; }

        /* 布局元素 */
        .visual-area { width: 45%; height: 300px; background: rgba(255,255,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .text-area { width: 40%; }
        
        /* 按钮与交互 */
        .option-circle { width: 60px; height: 60px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 10px; }
        
        /* 调音页特有 */
        .tuning-bar { width: 600px; height: 20px; background: #bbb; position: relative; border-radius: 10px; }
        .indicator { width: 40px; height: 40px; border: 1px solid #666; border-radius: 50%; position: absolute; bottom: -60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
</div>

<div id="main-container">
    <!-- Step 1 -->
    <div class="step-content active" id="step0">
        <div class="visual-area">[图片: 竹管堆]</div>
        <div class="text-area">
            <h3>管的数量决定排箫的音域</h3>
            <div style="display:flex; align-items:center;"><div class="option-circle"></div> 18根</div>
            <div style="display:flex; align-items:center;"><div class="option-circle"></div> 21根</div>
        </div>
    </div>

    <!-- Step 2 -->
    <div class="step-content" id="step1">
        <div class="visual-area">[图片: 排箫成品]</div>
        <div class="text-area">
            <p>烤直去青后，裁为长短不一的段</p>
            <h3>长度决定共振的音高</h3>
            <div class="option-circle"></div>
        </div>
    </div>

    <!-- Step 3 -->
    <div class="step-content" id="step2">
        <div style="display:flex; gap: 40px;">
            <div class="option-circle">粘接</div>
            <div class="option-circle">捆绑</div>
            <div class="option-circle">框架</div>
        </div>
    </div>

    <!-- Step 4 -->
    <div class="step-content" id="step3">
        <div style="text-align:center;">
            <div class="tuning-bar" id="tuner"></div>
            <div class="indicator" onclick="alert('吹气')">吹</div>
        </div>
    </div>
</div>

<script>
    let current = 0;
    const contents = document.querySelectorAll('.step-content');
    const dots = document.querySelectorAll('.dot');

    function update() {
        contents.forEach((c, i) => c.classList.toggle('active', i === current));
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    // 点击屏幕任何位置切换到下一步 (模拟演示)
    document.body.onclick = () => {
        if(current < 3) {
            current++;
            update();
        }
    };
</script>

</body>
</html>
