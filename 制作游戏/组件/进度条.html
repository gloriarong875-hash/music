<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进度条组件</title>
    // 在脚本中替换原来的 setNavStage 函数
    const progressNav = new ProgressNav('progress-nav', ['择竹', '汗青', '开孔', '试音']);
    // 然后用 progressNav.setStage(1) 代替原来的 setNavStage(1)
    <style>
        :root {
            --gold: #c9a96e;
            --gold-dim: #8a7a5a;
            --brown: #5a4a3a;
        }

        .nav-dots {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            z-index: 10;
        }

        .dot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #444;
            border: 2px solid #555;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(201, 169, 110, 0.45);
        }

        .dot.completed {
            background: var(--gold-dim);
            border-color: var(--gold-dim);
        }

        .dot-label {
            font-size: 12px;
            color: #7f7f7f;
            letter-spacing: 2px;
            transition: color 0.4s ease;
            white-space: nowrap;
        }

        .dot-wrapper.active .dot-label,
        .dot-wrapper.completed .dot-label {
            color: var(--gold);
        }

        @media (max-width: 768px) {
            .nav-dots {
                gap: 20px;
            }

            .dot {
                width: 12px;
                height: 12px;
            }

            .dot-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
<div class="nav-dots" id="progress-nav">
    <!-- 动态生成，或使用插槽 -->
</div>

<script>
    /**
     * 进度条组件 - ProgressNav
     * 用于显示多步骤进度指示器
     *
     * 用法：
     * const nav = new ProgressNav('progress-nav', ['步骤1', '步骤2', '步骤3', '步骤4']);
     * nav.setStage(2); // 设置当前步骤
     */
    class ProgressNav {
        constructor(containerId, stages = []) {
            this.container = document.getElementById(containerId);
            this.stages = stages;
            this.currentStage = 0;
            if (this.stages.length > 0) {
                this.render();
            }
        }

        render() {
            this.container.innerHTML = '';
            this.stages.forEach((label, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dot-wrapper';
                if (index === 0) wrapper.classList.add('active');

                const dot = document.createElement('div');
                dot.className = 'dot';
                if (index === 0) dot.classList.add('active');

                const dotLabel = document.createElement('div');
                dotLabel.className = 'dot-label';
                dotLabel.textContent = label;

                wrapper.appendChild(dot);
                wrapper.appendChild(dotLabel);
                this.container.appendChild(wrapper);
            });
            this.dotWrappers = this.container.querySelectorAll('.dot-wrapper');
        }

        setStage(index) {
            if (index < 0 || index >= this.stages.length) return;
            this.currentStage = index;

            this.dotWrappers.forEach((wrapper, i) => {
                wrapper.classList.remove('active', 'completed');
                const dot = wrapper.querySelector('.dot');
                dot.classList.remove('active', 'completed');

                if (i < index) {
                    wrapper.classList.add('completed');
                    dot.classList.add('completed');
                } else if (i === index) {
                    wrapper.classList.add('active');
                    dot.classList.add('active');
                }
            });
        }

        getCurrentStage() {
            return this.currentStage;
        }

        getStages() {
            return this.stages;
        }
    }

    // 导出用于模块化使用
    if (typeof module !== 'undefined' && module.exports) {
        module.exports = ProgressNav;
    }
    window.ProgressNav = ProgressNav;
</script>
</body>
</html>
