<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千年调 - 择竹</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --gold: #c9a96e;
            --dark-brown: #5a4a3a;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: '宋体', 'SimSun', serif;
            overflow-x: hidden;
        }

        /* 视差容器 */
        #stage {
            height: 200vh; /* 创造滚动空间 */
            position: relative;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            will-change: transform;
        }

        /* 视觉规范：层级速度 */
        #layer-bg { z-index: 1; background: linear-gradient(to bottom, #1a1a1a, #2c2c2c); }
        #layer-mid { z-index: 2; }
        #layer-front { z-index: 3; }

        /* 交互竹子样式 */
        .bamboo {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: sepia(0.3) brightness(0.8);
        }

        .bamboo:hover { filter: sepia(0) brightness(1.2); }
        
        .bamboo.disabled { filter: grayscale(1) brightness(0.5); cursor: not-allowed; }
        .bamboo.selected { filter: brightness(1.5) drop-shadow(0 0 20px var(--gold)); }

        /* UI 元素 */
        .ui-btn {
            position: fixed;
            top: 50px;
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }
        #btn-left { left: 50px; }
        #btn-right { right: 50px; }

        /* 弹窗 */
        #modal {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid var(--gold);
            padding: 2rem;
            max-width: 400px;
            display: none;
            z-index: 100;
        }

        /* 提示文字 */
        .tooltip {
            position: absolute;
            padding: 10px;
            background: var(--dark-brown);
            border: 1px solid var(--gold);
            display: none;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="stage">
        <!-- 背景层 -->
        <div id="layer-bg" class="layer"></div>
        
        <!-- 竹林层 -->
        <div id="layer-mid" class="layer">
            <div style="width: 100%; height: 100%; background: url('https://placehold.co/1920x1080/1a1a1a/444444/png?text=Bamboo+Forest+Mid') no-repeat center;"></div>
        </div>

        <!-- 前景竹子层 -->
        <div id="layer-front" class="layer">
            <!-- 竹子 1：嫩竹 -->
            <div class="bamboo" id="b-1" style="left: 20%; bottom: 20%; width: 100px; height: 400px; background: #3e4a3d;"></div>
            <!-- 竹子 2：歪竹 -->
            <div class="bamboo" id="b-2" style="left: 50%; bottom: 10%; width: 120px; height: 500px; background: #3e4a3d;"></div>
            <!-- 竹子 3：择选竹 -->
            <div class="bamboo" id="b-3" style="left: 80%; bottom: 15%; width: 110px; height: 450px; background: #3e4a3d;"></div>
        </div>
    </div>

    <!-- UI -->
    <div id="btn-left" class="ui-btn">?</div>
    <div id="btn-right" class="ui-btn">文</div>
    <div id="tooltip" class="tooltip"></div>
    <div id="modal">
        <h2 id="modal-title">择竹之道</h2>
        <p id="modal-desc">冬至伐竹，竹龄三年，壁厚均匀者为上。</p>
        <button onclick="document.getElementById('modal').style.display='none'">关闭</button>
    </div>

    <script>
        // 音效系统
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 视差滚动
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            document.getElementById('layer-bg').style.transform = `translateY(${scrolled * 0.5}px) scale(${1 + scrolled * 0.0001})`;
            document.getElementById('layer-mid').style.transform = `translateY(${scrolled * 1.0}px)`;
            document.getElementById('layer-front').style.transform = `translateY(${scrolled * 1.5}px)`;
        });

        // 交互逻辑
        const bamboos = {
            'b-1': { name: '嫩竹', info: '应取3年以上的老竹，直径2-3公分' },
            'b-2': { name: '歪竹', info: '应取质地均匀、壁厚杆直、无虫蛀的竹材' },
            'b-3': { name: '优选竹', info: '适宜制笛，点击采伐' }
        };

        document.querySelectorAll('.bamboo').forEach(el => {
            el.addEventListener('mouseover', (e) => {
                const info = bamboos[el.id];
                const tooltip = document.getElementById('tooltip');
                tooltip.style.display = 'block';
                tooltip.style.left = (e.pageX + 10) + 'px';
                tooltip.style.top = (e.pageY - 30) + 'px';
                tooltip.innerText = info.name + ': ' + info.info;
                
                if(el.id !== 'b-3') el.classList.add('disabled');
            });

            el.addEventListener('mouseout', () => {
                document.getElementById('tooltip').style.display = 'none';
                el.classList.remove('disabled');
            });

            el.addEventListener('click', () => {
                if(el.id === 'b-3') {
                    playClickSound();
                    el.classList.add('selected');
                    setTimeout(() => {
                        alert("选中成功！竹材将进入阴干阶段（新竹砍下需要阴干2年以上）");
                        el.style.backgroundColor = '#2a1a1a'; // 变色模拟阴干
                    }, 500);
                } else {
                    alert("此竹材不符合要求。");
                }
            });
        });

        // UI 交互
        document.getElementById('btn-right').addEventListener('click', () => {
            document.getElementById('modal').style.display = 'block';
        });
    </script>
</body>
</html>
