<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>水墨竹笛 · 五音演奏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Noto Serif SC", "楷体", "KaiTi", "华文楷体", "STKaiti", "宋体", "SimSun", "Georgia", "Times New Roman", serif;
      padding: 20px;
      margin: 0;
    }

    .game-container {
      max-width: 800px;
      width: 100%;
      background: transparent;
      border-radius: 48px;
      padding: 15px 10px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 700px;
      background: transparent;
      border-radius: 30px;
      margin: 5px 0 8px;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.6));
      transition: filter 0.2s;
      cursor: pointer;
    }

    .fingering-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 10px 0 5px;
      background: rgba(26, 26, 26, 0.75);
      backdrop-filter: blur(5px);
      padding: 12px 28px;
      border-radius: 50px;
      border: 1px solid #5a4a3a;
      color: #d4c5a9;
    }

    .key-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(42, 36, 28, 0.85);
      padding: 5px 14px;
      border-radius: 30px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      font-size: 1.05rem;
      border: 1px solid #5a4a3a;
      transition: all 0.15s ease;
    }
    .key-item.active {
      border-color: #c9a96e;
      box-shadow: 0 0 16px rgba(201, 169, 110, 0.45);
      background: rgba(60, 48, 32, 0.9);
    }

    .key-badge {
      background: #5a4a3a;
      color: #c9a96e;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 0 8px rgba(201, 169, 110, 0.3);
      border: 1px solid #c9a96e;
      transition: all 0.15s ease;
    }
    .key-item.active .key-badge {
      background: #7a5a3a;
      box-shadow: 0 0 16px rgba(255, 180, 80, 0.6);
    }

    .key-note {
      color: #b0a080;
      font-size: 0.85rem;
      min-width: 28px;
      text-align: center;
    }
    .key-item.active .key-note {
      color: #f0d090;
    }

    .instruction {
      color: #8a7a6a;
      margin-top: 6px;
      font-size: 0.9rem;
      opacity: 0.85;
      text-shadow: 0 0 4px rgba(0,0,0,0.5);
      text-align: center;
      line-height: 1.6;
    }
    .instruction .now-playing {
      color: #c9a96e;
      font-weight: bold;
      font-size: 1.05rem;
    }

    @media (max-width: 500px) {
      .fingering-panel {
        gap: 6px;
        padding: 8px 14px;
      }
      .key-item {
        padding: 4px 10px;
        gap: 4px;
        font-size: 0.9rem;
      }
      .key-badge {
        width: 26px;
        height: 26px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="bambooFluteCanvas" width="1800" height="320" aria-label="水墨竹笛，按键对应数字1-7，带指法孔位亮起"></canvas>

  <div class="fingering-panel" id="fingeringPanel">
    <!-- JS 动态生成 -->
  </div>

  <div class="instruction" id="instructionBar">
    ✦ 按下数字键 <b>1~7</b> 吹奏竹笛 ✦ 鼠标点击 / 触摸笛孔亦可 ✦<br>
    <span class="now-playing" id="nowPlaying"></span>
  </div>
</div>

<script>
  (function() {
    // ──────────────── 音高映射 ────────────────
    const toneMap = {
      '1': { wuYin: '宫', noteName: '1 · 宫', freq: 523.25, desc: 'Do / C' },
      '2': { wuYin: '商', noteName: '2 · 商', freq: 587.33, desc: 'Re / D' },
      '3': { wuYin: '角', noteName: '3 · 角', freq: 659.25, desc: 'Mi / E' },
      '4': { wuYin: '清角',noteName: '4 · 清角',freq: 698.46, desc: 'Fa / F' },
      '5': { wuYin: '徵', noteName: '5 · 徵', freq: 783.99, desc: 'Sol / G' },
      '6': { wuYin: '羽', noteName: '6 · 羽', freq: 880.00, desc: 'La / A' },
      '7': { wuYin: '变宫',noteName: '7 · 变宫',freq: 987.77, desc: 'Ti / B' }
    };

    // ──────────────── 指法表 (筒音作5) ────────────────
    // 孔位索引 0~6 对应画布上从左到右的7个孔
    //   [0] 膜孔/辅助孔 (key '1') — 永远不按
    //   [1] 第6孔 — 左手食指 (key '2')
    //   [2] 第5孔 — 左手中指 (key '3')
    //   [3] 第4孔 — 左手无名指 (key '4')
    //   [4] 第3孔 — 右手无名指 (key '5')
    //   [5] 第2孔 — 右手中指 (key '6')
    //   [6] 第1孔 — 右手食指 (key '7')
    // true = 闭孔（亮起）, false = 开孔（暗色）
    const fingeringMap = {
      '5': [false, true,  true,  true,  true,  true,  true ], // 筒音=全按
      '6': [false, true,  true,  true,  true,  true,  false], // 开第①孔
      '7': [false, true,  true,  true,  true,  false, false], // 开①②
      '1': [false, true,  true,  true,  false, false, false], // 开①②③
      '2': [false, true,  true,  false, false, false, false], // 开①②③④
      '3': [false, true,  false, false, false, false, false], // 开①②③④⑤
      '4': [false, false, true,  true,  false, false, false], // 交叉：开①②③⑥·按④⑤
    };

    // ──────────────── DOM 引用 ────────────────
    const canvas = document.getElementById('bambooFluteCanvas');
    const ctx = canvas.getContext('2d');
    const fluteImage = new Image();
    let fluteImageLoaded = false;

    fluteImage.onload = () => {
      fluteImageLoaded = true;
      drawFrame();
    };
    fluteImage.src = '图片/笛.svg';

    // 如果 SVG 加载失败，回退到程序绘制
    fluteImage.onerror = () => {
      console.warn('SVG 笛身加载失败，使用程序绘制');
      drawFrame();
    };

    // ──────────────── 画布布局常量 ────────────────
    const CANVAS_W = 1800;
    const CANVAS_H = 320;
    const FLUTE_IMG_X = 138;        // SVG 绘制起始 X
    const FLUTE_IMG_Y = 100;        // SVG 绘制起始 Y
    const FLUTE_IMG_W = 1523;       // SVG 原始宽度
    const FLUTE_IMG_H = 98;         // SVG 缩放后高度
    const FLUTE_CENTER_Y = FLUTE_IMG_Y + FLUTE_IMG_H / 2; // ≈149

    // 笛孔位置 (从左到右排列在竹管上)
    const fluteHoles = [
      { key: '1', x: 200,  y: FLUTE_CENTER_Y, radius: 15, label: '膜' },    // 膜孔
      { key: '2', x: 380,  y: FLUTE_CENTER_Y, radius: 16, label: '⑥' },    // 第6孔 (左食指)
      { key: '3', x: 530,  y: FLUTE_CENTER_Y, radius: 16, label: '⑤' },    // 第5孔 (左中指)
      { key: '4', x: 750,  y: FLUTE_CENTER_Y, radius: 16, label: '④' },    // 第4孔 (左无名指)
      { key: '5', x: 920,  y: FLUTE_CENTER_Y, radius: 16, label: '③' },    // 第3孔 (右无名指)
      { key: '6', x: 1120, y: FLUTE_CENTER_Y, radius: 16, label: '②' },    // 第2孔 (右中指)
      { key: '7', x: 1350, y: FLUTE_CENTER_Y, radius: 16, label: '①' },    // 第1孔 (右食指)
    ];

    // 吹孔
    const blowHole = { x: 105, y: FLUTE_CENTER_Y - 9, radius: 11 };

    // ──────────────── 状态 ────────────────
    let audioCtx = null;
    let activeOscillators = [];
    let activeGainNode = null;

    // 当前激活的音符（用于孔位亮起）
    let activeKey = null;

    // 孔位亮度过渡 (0~1，每个孔独立)
    let holeGlow = [0, 0, 0, 0, 0, 0, 0];       // 当前值
    let holeGlowTarget = [0, 0, 0, 0, 0, 0, 0]; // 目标值

    // 浮动文字
    let floatingTexts = [];

    // ──────────────── 音频引擎 ────────────────
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { console.warn('无法创建 AudioContext'); }
    }

    function stopSound() {
      activeOscillators.forEach(o => {
        try { o.stop(); } catch(e) {}
      });
      activeOscillators = [];
      activeGainNode = null;
    }

    function playTone(key) {
      if (!audioCtx) { initAudio(); if (!audioCtx) return; }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      stopSound();
      const freq = toneMap[key].freq;
      if (!freq) return;

      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.45, now + 0.05);
      gain.gain.setValueAtTime(0.40, now + 0.25);
      gain.gain.linearRampToValueAtTime(0.32, now + 1.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

      // 基频 + 泛音
      const harmonics = [
        { mult: 1, type: 'sine', vol: 0.65 },
        { mult: 2, type: 'triangle', vol: 0.22 },
        { mult: 3, type: 'sine', vol: 0.08 },
      ];

      harmonics.forEach(h => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = h.type;
        osc.frequency.setValueAtTime(freq * h.mult, now);
        g.gain.setValueAtTime(h.vol, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
        osc.connect(g);
        g.connect(gain);
        osc.start(now);
        osc.stop(now + 2.1);
        activeOscillators.push(osc);
      });

      gain.connect(audioCtx.destination);
      activeGainNode = gain;
    }

    // ──────────────── 指法亮孔逻辑 ────────────────
    function updateFingeringDisplay(key) {
      // 设置目标：该音符指法中需要按下的孔 glow=1，其余 glow=0
      const fingering = fingeringMap[key];
      if (!fingering) {
        // 清空所有
        for (let i = 0; i < 7; i++) holeGlowTarget[i] = 0;
        return;
      }
      for (let i = 0; i < 7; i++) {
        holeGlowTarget[i] = fingering[i] ? 1.0 : 0.0;
      }
    }

    function clearFingeringDisplay() {
      for (let i = 0; i < 7; i++) holeGlowTarget[i] = 0;
    }

    // ──────────────── 浮动文字 ────────────────
    function addFloatingText(key, holeX, holeY) {
      floatingTexts = floatingTexts.filter(t => t.key !== key);
      floatingTexts.push({
        key,
        x: holeX,
        y: holeY - 36,
        opacity: 1.0,
        startTime: performance.now()
      });
    }

    // ──────────────── 绘制 ────────────────
    function drawFrame() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      // ── 背景：淡淡的水墨晕染 ──
      const bgGrad = ctx.createRadialGradient(900, 160, 50, 900, 160, 1000);
      bgGrad.addColorStop(0, 'rgba(40,35,30,0.25)');
      bgGrad.addColorStop(1, 'rgba(26,26,26,0)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // ── 笛身 SVG 题图 ──
      if (fluteImageLoaded) {
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 18;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 8;
        ctx.drawImage(fluteImage, FLUTE_IMG_X, FLUTE_IMG_Y, FLUTE_IMG_W, FLUTE_IMG_H);
        ctx.restore();

        // 膜孔位置指示 (在 SVG 上标记)
        ctx.save();
        ctx.fillStyle = 'rgba(200,180,150,0.35)';
        ctx.beginPath();
        ctx.arc(200, FLUTE_CENTER_Y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else {
        // ── 回退：程序绘制笛身 ──
        drawFallbackFlute();
      }

      // ── 吹孔 ──
      ctx.save();
      ctx.shadowColor = '#0a0a0a';
      ctx.shadowBlur = 6;
      const blowGrad = ctx.createRadialGradient(blowHole.x-2, blowHole.y-2, 2, blowHole.x, blowHole.y, blowHole.radius);
      blowGrad.addColorStop(0, '#4a3525');
      blowGrad.addColorStop(0.6, '#2a1a10');
      blowGrad.addColorStop(1, '#0f0804');
      ctx.beginPath();
      ctx.arc(blowHole.x, blowHole.y, blowHole.radius, 0, Math.PI*2);
      ctx.fillStyle = blowGrad;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#c9a96e';
      ctx.lineWidth = 1.6;
      ctx.stroke();
      ctx.restore();

      // ── 绘制所有指孔（带发光过渡） ──
      fluteHoles.forEach((hole, idx) => {
        const glow = holeGlow[idx];
        ctx.save();

        if (glow > 0.02) {
          // 外层光晕
          const outerGlow = ctx.createRadialGradient(hole.x, hole.y, hole.radius * 0.6, hole.x, hole.y, hole.radius * 2.2);
          outerGlow.addColorStop(0, `rgba(255,180,60,${0.7 * glow})`);
          outerGlow.addColorStop(0.5, `rgba(255,150,30,${0.35 * glow})`);
          outerGlow.addColorStop(1, `rgba(255,120,10,0)`);
          ctx.beginPath();
          ctx.arc(hole.x, hole.y, hole.radius * 2.2, 0, Math.PI*2);
          ctx.fillStyle = outerGlow;
          ctx.fill();

          // 中层暖光
          const midGlow = ctx.createRadialGradient(hole.x, hole.y, 2, hole.x, hole.y, hole.radius * 1.3);
          midGlow.addColorStop(0, `rgba(255,200,100,${0.9 * glow})`);
          midGlow.addColorStop(0.6, `rgba(220,140,50,${0.5 * glow})`);
          midGlow.addColorStop(1, `rgba(180,100,30,0)`);
          ctx.beginPath();
          ctx.arc(hole.x, hole.y, hole.radius * 1.3, 0, Math.PI*2);
          ctx.fillStyle = midGlow;
          ctx.fill();
        }

        // 孔洞主体
        ctx.shadowColor = '#0a0a0a';
        ctx.shadowBlur = glow > 0.1 ? 3 : 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        const holeInner = ctx.createRadialGradient(hole.x-2, hole.y-2, 1, hole.x, hole.y, hole.radius);
        if (glow > 0.05) {
          // 按下的孔：偏暖、偏亮
          holeInner.addColorStop(0, `rgba(${80+60*glow},${50+30*glow},${25+15*glow},1)`);
          holeInner.addColorStop(0.6, `rgba(${55+35*glow},${35+20*glow},${18+10*glow},1)`);
          holeInner.addColorStop(1, `rgba(${25+15*glow},${15+8*glow},${8+4*glow},1)`);
        } else {
          holeInner.addColorStop(0, '#5a4530');
          holeInner.addColorStop(0.7, '#2f2417');
          holeInner.addColorStop(1, '#140f0a');
        }

        ctx.beginPath();
        ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI*2);
        ctx.fillStyle = holeInner;
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.strokeStyle = glow > 0.1
          ? `rgba(${220+35*glow},${170+70*glow},${80+80*glow},${0.5+0.5*glow})`
          : '#7a6a50';
        ctx.lineWidth = glow > 0.3 ? 1.8 : 1.2;
        ctx.stroke();

        ctx.restore();
      });

      // ── 浮动文字 ──
      floatingTexts.forEach(text => {
        if (text.opacity <= 0.02) return;
        ctx.save();
        ctx.globalAlpha = text.opacity;
        ctx.font = 'bold 22px "楷体", "KaiTi", "Noto Serif SC", serif';
        ctx.fillStyle = '#f0d080';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 10;
        const offsetY = (1 - text.opacity) * 14;
        ctx.fillText(toneMap[text.key].wuYin, text.x - 20, text.y - offsetY);
        ctx.restore();
      });

      // ── 当前音符标签 ──
      if (activeKey && toneMap[activeKey]) {
        ctx.save();
        ctx.font = 'italic 16px "楷体", "KaiTi", "Noto Serif SC", serif';
        ctx.fillStyle = 'rgba(200,170,120,0.8)';
        ctx.textAlign = 'right';
        ctx.fillText(`筒音作5 · ${toneMap[activeKey].wuYin}`, CANVAS_W - 60, 45);
        ctx.textAlign = 'start';
        ctx.restore();
      }
    }

    // 回退笛身绘制（SVG 不可用时）
    function drawFallbackFlute() {
      ctx.save();
      const fy = FLUTE_CENTER_Y;
      const grad = ctx.createLinearGradient(130, fy-28, 130, fy+28);
      grad.addColorStop(0, '#cbb286');
      grad.addColorStop(0.3, '#e7d0a8');
      grad.addColorStop(0.5, '#f0dbb8');
      grad.addColorStop(0.7, '#d4b482');
      grad.addColorStop(1, '#9e7e54');

      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 14;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 5;

      const r = 28;
      const sx = 140, ex = 1660;
      ctx.beginPath();
      ctx.moveTo(sx + r, fy - 26);
      ctx.lineTo(ex - r, fy - 26);
      ctx.quadraticCurveTo(ex, fy - 26, ex, fy - 26 + r);
      ctx.lineTo(ex, fy + 26 - r);
      ctx.quadraticCurveTo(ex, fy + 26, ex - r, fy + 26);
      ctx.lineTo(sx + r, fy + 26);
      ctx.quadraticCurveTo(sx, fy + 26, sx, fy + 26 - r);
      ctx.lineTo(sx, fy - 26 + r);
      ctx.quadraticCurveTo(sx, fy - 26, sx + r, fy - 26);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 6;
      ctx.strokeStyle = '#4a3e2c';
      ctx.lineWidth = 2.4;
      ctx.stroke();
      ctx.restore();
    }

    // ──────────────── 动画循环 ────────────────
    function animationLoop(now) {
      // 更新孔位发光过渡
      for (let i = 0; i < 7; i++) {
        const diff = holeGlowTarget[i] - holeGlow[i];
        if (Math.abs(diff) < 0.01) {
          holeGlow[i] = holeGlowTarget[i];
        } else {
          holeGlow[i] += diff * 0.18; // 平滑过渡
        }
      }

      // 更新浮动文字
      floatingTexts = floatingTexts.filter(text => {
        const elapsed = (now - text.startTime) / 1000;
        text.opacity = Math.max(0, 1 - elapsed * 1.3);
        return text.opacity > 0.015;
      });

      drawFrame();
      requestAnimationFrame(animationLoop);
    }

    // ──────────────── 交互触发 ────────────────
    function triggerTone(key) {
      if (!toneMap[key]) return;

      playTone(key);
      updateFingeringDisplay(key);

      // 更新 UI 面板
      updatePanelActive(key);

      // 更新指令栏
      const np = document.getElementById('nowPlaying');
      if (np) {
        np.textContent = `当前吹奏：${toneMap[key].noteName}（${toneMap[key].desc}）`;
      }

      // 浮动文字 - 在所有对应按孔上方浮现
      const hole = fluteHoles.find(h => h.key === key);
      if (hole) {
        addFloatingText(key, hole.x, hole.y);
        // 同时激活孔位的发光
        activeKey = key;
      }

      // 音效结束后清除
      clearTimeout(window._toneTimeout);
      window._toneTimeout = setTimeout(() => {
        activeKey = null;
        clearFingeringDisplay();
        updatePanelActive(null);
        const np2 = document.getElementById('nowPlaying');
        if (np2) np2.textContent = '';
      }, 2200);
    }

    // ──────────────── 键盘提示面板 ────────────────
    function buildFingeringPanel() {
      const panel = document.getElementById('fingeringPanel');
      if (!panel) return;

      const keys = ['5','6','7','1','2','3','4']; // 从低到高排列
      panel.innerHTML = keys.map(k => {
        const t = toneMap[k];
        const holes = fingeringMap[k];
        const fingerStr = holes
          ? holes.slice(1).map((pressed, i) => pressed ? '●' : '○').join(' ')
          : '';
        return `
          <div class="key-item" data-key="${k}">
            <span class="key-badge">${k}</span>
            <span class="key-note">${t.wuYin}</span>
            <span style="font-size:0.7rem;color:#6a5a4a;letter-spacing:1px;min-width:72px;">${fingerStr}</span>
          </div>`;
      }).join('');

      // 点击面板触发
      panel.querySelectorAll('.key-item').forEach(el => {
        el.addEventListener('click', () => {
          const k = el.dataset.key;
          if (k) triggerTone(k);
        });
      });
    }

    function updatePanelActive(key) {
      const panel = document.getElementById('fingeringPanel');
      if (!panel) return;
      panel.querySelectorAll('.key-item').forEach(el => {
        el.classList.toggle('active', el.dataset.key === key);
      });
    }

    // ──────────────── 事件绑定 ────────────────
    function setupEvents() {
      // 键盘
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        const key = e.key;
        if (toneMap[key]) {
          e.preventDefault();
          triggerTone(key);
        }
      });

      // 鼠标点击
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = CANVAS_W / rect.width;
        const scaleY = CANVAS_H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        // 检查吹孔
        const bdx = mx - blowHole.x, bdy = my - blowHole.y;
        if (Math.sqrt(bdx*bdx + bdy*bdy) <= blowHole.radius + 6) {
          // 点击吹孔：吹奏当前选中的音，或默认筒音5
          triggerTone(activeKey || '5');
          return;
        }

        for (let hole of fluteHoles) {
          const dx = mx - hole.x, dy = my - hole.y;
          if (Math.sqrt(dx*dx + dy*dy) <= hole.radius + 8) {
            triggerTone(hole.key);
            return;
          }
        }
      });

      // 触摸
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        if (!touch) return;
        const scaleX = CANVAS_W / rect.width;
        const scaleY = CANVAS_H / rect.height;
        const tx = (touch.clientX - rect.left) * scaleX;
        const ty = (touch.clientY - rect.top) * scaleY;

        for (let hole of fluteHoles) {
          const dx = tx - hole.x, dy = ty - hole.y;
          if (Math.sqrt(dx*dx + dy*dy) <= hole.radius + 10) {
            triggerTone(hole.key);
            return;
          }
        }
      }, { passive: false });

      window.addEventListener('blur', () => stopSound());
    }

    // ──────────────── 启动 ────────────────
    window.addEventListener('load', () => {
      initAudio();
      buildFingeringPanel();
      setupEvents();
      requestAnimationFrame(animationLoop);

      // 首次交互解锁音频
      document.body.addEventListener('click', function unlockAudio() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: false });
    });
  })();
</script>
