<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>水墨竹笛 · 五音演奏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Noto Serif SC", "楷体", "KaiTi", "华文楷体", "STKaiti", "宋体", "SimSun", "Georgia", "Times New Roman", serif;
      padding: 20px;
      margin: 0;
    }

    .game-container {
      max-width: 750px;
      width: 100%;
      background: transparent;
      border-radius: 48px;
      padding: 25px 20px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 650px;
      background: transparent;
      border-radius: 60px;
      margin: 5px 0 10px;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.7));
      transition: filter 0.2s;
    }
    canvas:active {
      filter: drop-shadow(0 8px 15px rgba(201, 169, 110, 0.5));
    }

    .keyboard-hint {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 20px 0 5px;
      background: rgba(26, 26, 26, 0.7);
      backdrop-filter: blur(5px);
      padding: 10px 25px;
      border-radius: 50px;
      border: 1px solid #5a4a3a;
      color: #d4c5a9;
      font-weight: 500;
    }

    .key-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(42, 36, 28, 0.8);
      padding: 5px 16px;
      border-radius: 30px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      font-size: 1.1rem;
      border: 1px solid #5a4a3a;
    }

    .key-badge {
      background: #5a4a3a;
      color: #c9a96e;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 0 8px rgba(201, 169, 110, 0.3);
      border: 1px solid #c9a96e;
    }

    .instruction {
      color: #8a7a6a;
      margin-top: 8px;
      font-size: 0.95rem;
      opacity: 0.85;
      text-shadow: 0 0 4px rgba(0,0,0,0.5);
      text-align: center;
    }

    @media (max-width: 500px) {
      .keyboard-hint {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- 水墨笛子绘制区域 (五音将在此canvas上浮现) -->
  <canvas id="bambooFluteCanvas" width="1800" height="100" aria-label="水墨竹笛，按键对应数字1-7"></canvas>

  <!-- 键盘指法提示 (仅保留数字按键) -->
 
  <div class="instruction">
    ✦ 按下数字键 1~7 吹奏竹笛 ✦ 鼠标点击/触摸笛孔亦可 ✦
  </div>
</div>

<script>
  (function() {
    // ---------- 五音与数字映射 ----------
    const toneMap = {
      '1': { wuYin: '宫', noteName: '1 · 宫', freq: 523.25 },
      '2': { wuYin: '商', noteName: '2 · 商', freq: 587.33 },
      '3': { wuYin: '角', noteName: '3 · 角', freq: 659.25 },
      '4': { wuYin: '清角', noteName: '4 · 清角', freq: 698.46 },
      '5': { wuYin: '徵', noteName: '5 · 徵', freq: 783.99 },
      '6': { wuYin: '羽', noteName: '6 · 羽', freq: 880.00 },
      '7': { wuYin: '变宫', noteName: '7 · 变宫', freq: 987.77 }
    };

    const canvas = document.getElementById('bambooFluteCanvas');
    const ctx = canvas.getContext('2d');
    const fluteImage = new Image();
    let fluteImageLoaded = false;

    fluteImage.onload = () => {
      fluteImageLoaded = true;
      drawFluteWithFloatingTexts();
    };
    fluteImage.src = '笛.svg';

    let audioCtx = null;
    let activeOscillator = null;
    let activeGain = null;

    // 动画相关：记录浮现的五音文字及其透明度/位置
    let floatingTexts = [];  // 每个元素: { key, x, y, opacity, startTime }

    // 笛孔位置定义 (用于绘制与交互检测)
    const fluteHoles = [
      { key: '1', x: 245, y:55, radius: 16 },
      { key: '2', x: 410, y: 55, radius: 16 },
      { key: '3', x: 675, y: 55, radius: 16 },
      { key: '4', x: 840, y: 55, radius: 16 },
      { key: '5', x: 1000, y: 55, radius: 16 },
      { key: '6', x: 1200, y: 55, radius: 16 },
      { key: '7', x: 1450, y: 55, radius: 16 }
    ];

    // ---------- 动画循环 (用于浮现文字淡出) ----------
    function startAnimationLoop() {
      function step() {
        // 更新浮动文字状态
        const now = Date.now();
        floatingTexts = floatingTexts.filter(text => {
          const elapsed = (now - text.startTime) / 1000; // 秒
          text.opacity = Math.max(0, 1 - elapsed * 1.2); // 1.2秒内淡出
          return text.opacity > 0.02;
        });
        
        // 重绘画布 (包含浮动文字)
        drawFluteWithFloatingTexts();
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // 添加浮动文字
    function addFloatingText(key, holeX, holeY) {
      // 移除同一按键的旧浮动文字，避免重叠
      floatingTexts = floatingTexts.filter(t => t.key !== key);
      floatingTexts.push({
        key: key,
        x: holeX,
        y: holeY - 28, // 从孔上方开始浮现
        opacity: 1.0,
        startTime: Date.now()
      });
    }

    // ---------- 绘制水墨竹笛 (包含浮动五音) ----------
    function drawFluteWithFloatingTexts() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const fluteXStart = 70;
      const fluteXEnd = 600;
      const fluteYCenter = 160;

      ctx.save();
      if (fluteImageLoaded) {
        ctx.drawImage(fluteImage, 0, 0, canvas.width, canvas.height);
      } else {
        // 笛身主渐变
        const gradient = ctx.createLinearGradient(fluteXStart, fluteYCenter - 25, fluteXStart, fluteYCenter + 25);
        gradient.addColorStop(0, '#cbb286');
        gradient.addColorStop(0.3, '#e7d0a8');
        gradient.addColorStop(0.5, '#f0dbb8');
        gradient.addColorStop(0.7, '#d4b482');
        gradient.addColorStop(1, '#9e7e54');

        ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 5;

        const radius = 26;
        ctx.beginPath();
        ctx.moveTo(fluteXStart + radius, fluteYCenter - 24);
        ctx.lineTo(fluteXEnd - radius, fluteYCenter - 24);
        ctx.quadraticCurveTo(fluteXEnd, fluteYCenter - 24, fluteXEnd, fluteYCenter - 24 + radius);
        ctx.lineTo(fluteXEnd, fluteYCenter + 24 - radius);
        ctx.quadraticCurveTo(fluteXEnd, fluteYCenter + 24, fluteXEnd - radius, fluteYCenter + 24);
        ctx.lineTo(fluteXStart + radius, fluteYCenter + 24);
        ctx.quadraticCurveTo(fluteXStart, fluteYCenter + 24, fluteXStart, fluteYCenter + 24 - radius);
        ctx.lineTo(fluteXStart, fluteYCenter - 24 + radius);
        ctx.quadraticCurveTo(fluteXStart, fluteYCenter - 24, fluteXStart + radius, fluteYCenter - 24);
        ctx.closePath();

        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.shadowBlur = 8;
        ctx.strokeStyle = '#4a3e2c';
        ctx.lineWidth = 2.4;
        ctx.stroke();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        // 竹节纹路
        ctx.save();
      }
      if (!fluteImageLoaded) {
        ctx.strokeStyle = '#5e4c34';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
      ctx.moveTo(105, fluteYCenter-20);
      ctx.quadraticCurveTo(108, fluteYCenter, 105, fluteYCenter+20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(112, fluteYCenter-21);
      ctx.quadraticCurveTo(115, fluteYCenter, 112, fluteYCenter+21);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(555, fluteYCenter-19);
      ctx.quadraticCurveTo(558, fluteYCenter, 555, fluteYCenter+19);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(562, fluteYCenter-20);
      ctx.quadraticCurveTo(565, fluteYCenter, 562, fluteYCenter+20);
      ctx.stroke();
      ctx.restore();
      }
      
      // 绘制所有笛孔 (不高亮，因为浮动文字替代了高亮)
      fluteHoles.forEach(hole => {
        ctx.save();
        ctx.shadowColor = '#0a0a0a';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        
        const holeGrad = ctx.createRadialGradient(hole.x-2, hole.y-2, 2, hole.x, hole.y, hole.radius);
        holeGrad.addColorStop(0, '#5a4530');
        holeGrad.addColorStop(0.7, '#2f2417');
        holeGrad.addColorStop(1, '#140f0a');
        
        ctx.beginPath();
        ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
        ctx.fillStyle = holeGrad;
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.strokeStyle = '#c9a96e';
        ctx.lineWidth = 1.4;
        ctx.stroke();
        ctx.restore();
      });
      
      // 吹孔
      ctx.save();
      ctx.shadowColor = '#1a140e';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(88, fluteYCenter-4, 10, 0, Math.PI*2);
      ctx.fillStyle = '#3d3224';
      ctx.fill();
      ctx.strokeStyle = '#c9a96e';
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();
      
      // 笛塞
      ctx.fillStyle = '#6b5a40';
      ctx.beginPath();
      ctx.ellipse(78, fluteYCenter-4, 4, 8, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 穗子
      ctx.beginPath();
      ctx.moveTo(68, fluteYCenter-4);
      ctx.lineTo(52, fluteYCenter-18);
      ctx.lineTo(56, fluteYCenter-8);
      ctx.lineTo(48, fluteYCenter+2);
      ctx.strokeStyle = '#b34a3a';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.fillStyle = '#c05540';
      ctx.beginPath();
      ctx.arc(52, fluteYCenter-20, 3, 0, Math.PI*2);
      ctx.fill();
      
      // ---- 绘制浮动五音文字 (演奏时浮现) ----
      floatingTexts.forEach(text => {
        if (text.opacity <= 0.02) return;
        ctx.save();
        ctx.globalAlpha = text.opacity;
        ctx.font = 'bold 22px "楷体", "KaiTi", "Noto Serif SC"';
        ctx.fillStyle = '#c9a96e';
        ctx.shadowColor = '#000000';
        ctx.shadowBlur = 8;
        // 文字位置轻微向上偏移，制造浮现感
        const offsetY = (1 - text.opacity) * 12; 
        ctx.fillText(toneMap[text.key].wuYin, text.x - 20, text.y - offsetY);
        ctx.restore();
      });
      
      ctx.restore();
    }

    // ---------- 音频引擎 ----------
    function initAudioContext() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        console.warn('无法创建音频上下文', e);
      }
    }

    function stopSound() {
      if (activeOscillator) {
        try {
          activeOscillator.stop();
        } catch (e) {}
        activeOscillator = null;
      }
      if (activeGain) {
        activeGain = null;
      }
    }

    function playTone(key) {
      if (!audioCtx) {
        initAudioContext();
        if (!audioCtx) return;
      }
      
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      stopSound();
      
      const freq = toneMap[key].freq;
      if (!freq) return;
      
      const now = audioCtx.currentTime;
      
      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(0.45, now + 0.06);
      gainNode.gain.linearRampToValueAtTime(0.38, now + 0.2);
      
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const osc3 = audioCtx.createOscillator();
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2, now);
      
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(freq * 3, now);
      
      const gain1 = audioCtx.createGain();
      gain1.gain.setValueAtTime(0.7, now);
      const gain2 = audioCtx.createGain();
      gain2.gain.setValueAtTime(0.2, now);
      const gain3 = audioCtx.createGain();
      gain3.gain.setValueAtTime(0.08, now);
      
      osc1.connect(gain1);
      osc2.connect(gain2);
      osc3.connect(gain3);
      
      gain1.connect(gainNode);
      gain2.connect(gainNode);
      gain3.connect(gainNode);
      
      gainNode.connect(audioCtx.destination);
      
      osc1.start(now);
      osc2.start(now);
      osc3.start(now);
      
      activeOscillator = { osc1, osc2, osc3 };
      activeGain = gainNode;
      
      const stopTime = now + 1.8;
      gainNode.gain.linearRampToValueAtTime(0.35, now + 1.0);
      gainNode.gain.exponentialRampToValueAtTime(0.001, stopTime);
      
      osc1.stop(stopTime + 0.05);
      osc2.stop(stopTime + 0.05);
      osc3.stop(stopTime + 0.05);
      
      setTimeout(() => {
        if (activeOscillator && activeOscillator.osc1 === osc1) {
          activeOscillator = null;
          activeGain = null;
        }
      }, 2000);
    }

    // 触发吹奏：播放声音 + 添加浮动五音文字
    function triggerTone(key) {
      if (!toneMap[key]) return;
      
      playTone(key);
      
      // 找到对应笛孔位置，添加浮动文字
      const hole = fluteHoles.find(h => h.key === key);
      if (hole) {
        addFloatingText(key, hole.x, hole.y);
      }
    }

    // ---------- 事件绑定 ----------
    function setupEvents() {
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        const key = e.key;
        if (toneMap[key]) {
          e.preventDefault();
          triggerTone(key);
        }
      });
      
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        
        for (let hole of fluteHoles) {
          const dx = mouseX - hole.x;
          const dy = mouseY - hole.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist <= hole.radius + 6) {
            triggerTone(hole.key);
            break;
          }
        }
      });
      
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        if (!touch) return;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touchX = (touch.clientX - rect.left) * scaleX;
        const touchY = (touch.clientY - rect.top) * scaleY;
        
        for (let hole of fluteHoles) {
          const dx = touchX - hole.x;
          const dy = touchY - hole.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist <= hole.radius + 8) {
            triggerTone(hole.key);
            break;
          }
        }
      }, { passive: false });
      
      window.addEventListener('blur', () => {
        stopSound();
      });
    }

    // 初始绘制
    function initialRender() {
      initAudioContext();
      drawFluteWithFloatingTexts();
    }

    window.addEventListener('load', () => {
      initialRender();
      setupEvents();
      startAnimationLoop();
      
      document.body.addEventListener('click', function activateAudio() {
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }, { once: false });
    });

  })();
</script>
</body>
</html>
