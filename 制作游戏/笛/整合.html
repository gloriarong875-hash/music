<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笛韵千年——竹笛制作</title>
    <style>
        :root {
            --gold: #c9a96e;
            --gold-dim: #8a7a5a;
            --brown: #5a4a3a;
            --bg: #1a1a1a;
            --bg-dark: #282828;
            --text: #fff;
            --text-gold: #c9a96e;
            --accent-warm: #98867a;
            --hole-size: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 25%), var(--bg);
            color: var(--text);
            font-family: 'Alibaba PuHuiTi 3.0', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ======================================== */
        /* === STAGE 1: PARALLAX BAMBOO SELECTION === */
        /* ======================================== */

        .parallax-scene {
            position: relative; width: 100vw; height: 100vh; overflow: hidden;
            opacity: 0; animation: fadeIn 0.8s ease 0.1s forwards;
        }
        .parallax-scene.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Fixed Background for parallax stage */
        .bg-fixed {
            position: absolute; inset: 0; z-index: 0; pointer-events: auto;
        }
        .bg-fixed img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .bg-fixed::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(50,66,69,0.77); mix-blend-mode: multiply;
            pointer-events: none; z-index: 1;
        }

        /* Image Layers (no CSS transitions — JS driven) */
        .layer {
            position: absolute; will-change: transform, opacity;
        }
        .layer img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Clickable — glow only */
        .layer.clickable { pointer-events: auto; cursor: pointer; }
        .layer.clickable img { transition: filter 0.4s ease; }
        .layer.clickable:hover img { filter: brightness(1.2) drop-shadow(0 0 22px rgba(255,195,98,0.55)); }
        .layer.clickable.selected img { filter: brightness(1.3) drop-shadow(0 0 40px rgba(255,195,98,0.85)); }

        .layer.clickable.bad-shake {
            animation: layerShake 0.4s ease-in-out;
        }
        @keyframes layerShake {
            0%, 100% { transform: translate(var(--sx), var(--sy)); }
            25% { transform: translate(calc(var(--sx) - 8px), var(--sy)); }
            75% { transform: translate(calc(var(--sx) + 8px), var(--sy)); }
        }

        .layer-xin { z-index: 3; }
        .layer-zhi { z-index: 4; }
        .layer-wai { z-index: 2; }

        /* White Circle Button */
        .circle-btn {
            position: absolute; z-index: 10;
            width: 62px; height: 62px;
            pointer-events: auto; cursor: pointer;
            will-change: transform;
        }
        .circle-inner {
            width: 62px; height: 62px; border-radius: 50%;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 0 35px 5px rgba(255,255,255,0.25),
                        inset 0 0 0 1px rgba(255,255,255,0.8);
            transition: all 0.35s ease;
        }
        .circle-btn:hover .circle-inner {
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 50px 10px rgba(255,255,255,0.45),
                        0 0 80px 15px rgba(255,195,98,0.4),
                        inset 0 0 0 1px rgba(255,255,255,0.95);
            transform: scale(1.18);
        }
        .circle-btn:active .circle-inner { transform: scale(0.93); }

        /* Circle Tooltip */
        .circle-tooltip {
            position: absolute; z-index: 20; pointer-events: none;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .circle-tooltip.visible { opacity: 1; transform: translateY(0); }
        .circle-tooltip .tt-text {
            color: var(--text-gold);
            font-size: clamp(16px, 2.2vw, 32px); font-weight: 300;
            line-height: 1.6;
            text-shadow: 0 2px 16px rgba(0,0,0,0.6), 0 0 30px rgba(0,0,0,0.3);
            background: rgba(20,20,20,0.55);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 12px 24px; border-radius: 8px; white-space: nowrap;
            border: 1px solid rgba(201,169,110,0.2);
        }

        /* Select Badge */
        .select-badge {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            color: var(--text-gold);
            font-size: clamp(14px,1.1vw,18px); font-weight: 300;
            letter-spacing: 2px; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
            text-shadow: 0 0 20px rgba(255,195,98,0.5);
        }
        .select-badge.show { opacity: 1; }

        /* Scroll Hint */
        .scroll-hint {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 99;
            color: var(--accent-warm);
            font-size: clamp(11px,0.9vw,13px); font-weight: 100;
            text-shadow: 0 0 18px rgba(255,255,255,0.5);
            pointer-events: none; letter-spacing: 2px;
            opacity: 1;
        }
        @keyframes hintPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
        .scroll-hint.pulse { animation: hintPulse 2.2s ease-in-out infinite; }

        /* Top Progress Bar */
        .parallax-progress {
            position: fixed; top: 0; left: 0; z-index: 110;
            width: 100%; height: 3px;
            pointer-events: none;
        }
        .parallax-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
            box-shadow: 0 0 12px rgba(201,169,110,0.5);
            transition: width 0.15s linear;
            width: 0%;
        }

        /* Back Button (top-right) */
        .back-btn {
            position: fixed; top: 18px; right: 22px; z-index: 120;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(20,20,20,0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(201,169,110,0.3);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.35s ease;
            pointer-events: auto;
        }
        .back-btn:hover {
            background: rgba(201,169,110,0.15);
            border-color: rgba(201,169,110,0.7);
            box-shadow: 0 0 20px rgba(201,169,110,0.3);
            transform: scale(1.08);
        }
        .back-btn:active { transform: scale(0.95); }
        .back-btn svg {
            width: 20px; height: 20px;
            stroke: var(--gold); stroke-width: 2;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Step Indicator Dots (parallax sub-steps) */
        .step-indicator {
            position: fixed;
            top: clamp(50px, 6vh, 60px); left: 50%;
            transform: translateX(-50%); z-index: 105;
            display: flex; align-items: center;
            gap: clamp(32px, 6vw, 90px); pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .step-label-group { display: flex; align-items: center; gap: 10px; }
        .step-label-text {
            color: var(--text-gold);
            font-size: clamp(14px, 1.2vw, 18px); font-weight: 100;
            text-shadow: 0 0 18px rgba(255,195,98,0.55);
            letter-spacing: 2px;
        }
        .step-gold-dot {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--text-gold);
            box-shadow: 0 0 18px rgba(255,195,98,0.55); flex-shrink: 0;
        }
        .step-dots { display: flex; gap: clamp(32px, 6vw, 90px); }
        .step-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent-warm);
            box-shadow: 0 0 14px rgba(255,255,255,0.4);
            transition: all 0.5s ease;
            pointer-events: auto; cursor: pointer;
        }
        .step-dot.active {
            background: #fff; transform: scale(1.4);
            box-shadow: 0 0 24px rgba(255,255,255,0.85);
        }

        /* ======================================== */
        /* === GLOBAL ELEMENTS === */
        /* ======================================== */

        #bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('图片/bg.png') center/cover no-repeat;
            opacity: 0.15;
            pointer-events: none;
            transform-origin: center;
            transition: transform 0.2s ease-out;
            display: none; /* hidden during parallax stage */
        }

        .fire-glow {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 140px;
            background: radial-gradient(ellipse at center, rgba(201, 169, 110, 0.18) 0%, transparent 65%);
            border-radius: 50%;
            animation: firePulse 3.5s ease-in-out infinite;
            pointer-events: none;
            opacity: 0;
            display: none;
        }

        @keyframes firePulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.75; transform: translateX(-50%) scale(1.08); }
        }

        .nav-dots {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .nav-dots.visible { opacity: 1; }

        .dot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #444;
            border: 2px solid #555;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(201, 169, 110, 0.45);
        }

        .dot.completed {
            background: var(--gold-dim);
            border-color: var(--gold-dim);
        }

        .dot-label {
            font-size: 12px;
            color: #7f7f7f;
            letter-spacing: 2px;
            transition: color 0.4s ease;
            white-space: nowrap;
        }

        .dot-wrapper.active .dot-label,
        .dot-wrapper.completed .dot-label {
            color: var(--gold);
        }

        /* ======================================== */
        /* === STAGE 2-3: BAKE / DRILL === */
        /* ======================================== */

        .stage-panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .stage-text {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            font-size: 1.15rem;
            letter-spacing: 2px;
            color: var(--gold);
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.35);
        }

        .stage-sub {
            position: absolute;
            top: 19%;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #b9a56b;
            letter-spacing: 1.5px;
            z-index: 2;
            opacity: 0.9;
        }

        .bamboo-container {
            position: relative;
            width: auto;
            max-width: 200px;
            height: 420px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-top: -6%;
            z-index: 2;
            cursor: grab;
        }

        .bamboo-container.grabbing {
            cursor: grabbing;
        }

        #bamboo-pipe {
            width: auto;
            height: 280px;
            max-height: 280px;
            object-fit: contain;
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(var(--bamboo-offset, 0px)) scale(0.78);
            z-index: 5;
            filter: sepia(0.35) brightness(0.9);
            transition: all 0.5s ease;
        }

        #bamboo-pipe.baking {
            filter: sepia(0.6) brightness(1.05) saturate(1.2);
            transform: translateX(-50%) translateY(var(--bamboo-offset, 0px)) scale(0.82);
        }

        #bamboo-pipe.baked {
            filter: sepia(0.8) brightness(0.88) contrast(1.05);
            transform: translateX(-50%) translateY(0) scale(0.85) rotate(0deg);
        }


        .steam {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 4;
        }

        .steam.active {
            opacity: 1;
        }

        .steam-particle {
            position: absolute;
            width: 3px;
            height: 30px;
            background: linear-gradient(to top, rgba(201, 169, 110, 0.35), transparent);
            border-radius: 50%;
            animation: steamRise 2s ease-out infinite;
        }

        @keyframes steamRise {
            0% { transform: translateY(0) scaleX(1); opacity: 0.6; }
            100% { transform: translateY(-80px) scaleX(0.5); opacity: 0; }
        }

        .swipe-hint {
            position: absolute;
            left: 6%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0.85;
            transition: opacity 0.4s ease;
        }

        .swipe-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .swipe-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .swipe-arrow svg {
            width: 30px;
            height: 40px;
            stroke: var(--gold);
            stroke-width: 2;
            fill: none;
        }

        .swipe-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 4px;
            line-height: 1.8;
        }

        .swipe-counter {
            position: absolute;
            bottom: 34%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 18px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .swipe-counter.visible {
            opacity: 1;
        }

        .swipe-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            border: 1px solid #555;
            transition: all 0.3s ease;
        }

        .swipe-dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
        }

        .progress-container {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 62%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dim));
            transition: width 0.3s ease;
        }

        .chisel-tool {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            width: 72px;
            height: 72px;
            border: 2px solid var(--gold-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.55;
            transition: all 0.4s ease;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            z-index: 15;
        }

        .chisel-tool.active {
            opacity: 1;
            border-color: var(--gold);
            box-shadow: 0 0 22px rgba(201, 169, 110, 0.35);
        }

        .chisel-tool:hover.active {
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.45);
        }

        .chisel-tool:active.active {
            transform: translateY(-50%) scale(0.98);
        }

        .chisel-tool svg {
            width: 34px;
            height: 34px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }

        .chisel-tool.clicking {
            animation: chiselClick 0.28s ease-out;
        }

        @keyframes chiselClick {
            0% { transform: translateY(-50%) rotate(0deg); }
            30% { transform: translateY(-45%) rotate(-14deg); }
            60% { transform: translateY(-55%) rotate(6deg); }
            100% { transform: translateY(-50%) rotate(0deg); }
        }

        .chisel-hint {
            position: absolute;
            right: 6%;
            top: 34%;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.4s ease;
            writing-mode: vertical-rl;
            text-orientation: upright;
            z-index: 15;
        }

        .chisel-hint.visible {
            opacity: 0.82;
        }

        .furnace {
            width: 480px;
            max-width: 48vw;
            margin: 18px auto 0;
            display: block;
            z-index: 2;
            filter: brightness(0.95);
            transition: all 0.5s ease;
        }

        .furnace.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .furnace:hover {
            transform: scale(1.03);
        }

        .complete-overlay {
            position: absolute;
            inset: 0;
            background: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 20;
        }

        .complete-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .complete-text {
            font-size: 2rem;
            color: var(--gold);
            letter-spacing: 8px;
            margin-bottom: 18px;
        }

        .complete-sub {
            font-size: 1rem;
            color: #b8b8b8;
            letter-spacing: 2px;
        }

        .final-stage {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            z-index: 6;
            background: var(--bg);
        }

        .final-stage.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .final-stage iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: var(--bg);
        }

        .holes-layer {
            position: absolute;
            inset: 0;
            pointer-events: auto;
            z-index: 12;
        }

        .hole {
            position: absolute;
            width: var(--hole-size);
            height: var(--hole-size);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .hole.ink-mark {
            border: 2px dashed rgba(60, 50, 40, 0.8);
            background: rgba(40, 35, 30, 0.4);
            box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
        }

        .hole.ink-mark:hover {
            border-color: var(--gold-dim);
            background: rgba(201, 169, 110, 0.15);
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.3), inset 0 0 4px rgba(0,0,0,0.5);
        }

        .hole.drilled {
            background: radial-gradient(circle at 30% 30%, #2a1f15 0%, #1a120a 40%, #3d2818 70%, #5a3a20 100%);
            border: 1px solid #4a3020;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 6px rgba(90, 58, 32, 0.6);
        }

        .hole-label {
            position: absolute;
            font-size: 11px;
            color: var(--gold-dim);
            letter-spacing: 1px;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0.8;
        }

        .hole-1 { left: 12%; top: 48%; }
        .hole-2 { left: 22%; top: 48%; }
        .hole-3 { left: 38%; top: 48%; }
        .hole-4 { left: 48%; top: 48%; }
        .hole-5 { left: 58%; top: 48%; }
        .hole-6 { left: 68%; top: 48%; }
        .hole-7 { left: 78%; top: 48%; }
        .hole-8 { left: 88%; top: 48%; }

        .label-1 { left: 12%; top: 35%; }
        .label-2 { left: 22%; top: 35%; }
        .label-3 { left: 38%; top: 35%; }
        .label-4 { left: 48%; top: 35%; }
        .label-5 { left: 58%; top: 35%; }
        .label-6 { left: 68%; top: 35%; }
        .label-7 { left: 78%; top: 35%; }
        .label-8 { left: 88%; top: 35%; }

        .scale-overlay {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 80%;
            max-width: 700px;
            padding: 20px 30px;
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid var(--gold-dim);
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s ease;
            z-index: 8;
        }

        .scale-overlay.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .scale-title {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 12px;
        }

        .scale-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .scale-item {
            text-align: center;
        }

        .scale-note {
            font-size: 24px;
            color: var(--gold);
            font-family: "Noto Serif SC", serif;
        }

        .scale-name {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .scale-line {
            width: 1px;
            height: 30px;
            background: var(--gold-dim);
            opacity: 0.5;
        }

        .gongche-panel {
            position: absolute;
            right: 3%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 12;
            pointer-events: none;
        }

        .gongche-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .gongche-title {
            font-size: 12px;
            color: var(--gold-dim);
            letter-spacing: 4px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--gold-dim);
            padding-bottom: 10px;
        }

        .gongche-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .gongche-char {
            font-size: 22px;
            color: var(--gold);
            font-family: "Noto Serif SC", serif;
            writing-mode: vertical-rl;
            text-orientation: upright;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            padding: 4px 0;
            position: relative;
        }

        .gongche-char.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chip-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes chipFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .sound-wave {
            position: absolute;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes waveExpand {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.8; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        .node-clear-animation {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 3;
        }

        .node-clear-animation.active {
            display: block;
        }

        .clear-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
        }

        @keyframes clearBurst {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* ======================================== */
        /* === FINAL STAGE (4-试音) === */
        /* ======================================== */

        #final-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 12;
        }

        #final-stage.visible {
            pointer-events: all;
        }

        #final-stage #final-bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2a2520 0%, #1a1a1a 70%);
            opacity: 0.6;
            pointer-events: none;
        }

        #final-stage .membrane-stage,
        #final-stage .play-stage {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }

        #final-stage .membrane-stage.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        #final-stage .membrane-title {
            position: absolute;
            top: 18%;
            font-size: 1.3rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
        }

        #final-stage .membrane-sub {
            position: absolute;
            top: 23%;
            font-size: 0.9rem;
            color: var(--gold-dim);
            letter-spacing: 2px;
        }

        #final-stage .membrane-options {
            display: flex;
            gap: 60px;
            margin-top: -5%;
        }

        #final-stage .membrane-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        #final-stage .membrane-item:hover {
            border-color: var(--gold-dim);
            background: rgba(201, 169, 110, 0.05);
            transform: translateY(-5px);
        }

        #final-stage .membrane-item.selected {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.1);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.2);
        }

        #final-stage .membrane-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--gold-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--gold);
            transition: all 0.4s ease;
        }

        #final-stage .membrane-item:hover .membrane-icon,
        #final-stage .membrane-item.selected .membrane-icon {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .membrane-name {
            font-size: 16px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        #final-stage .membrane-desc {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        #final-stage .confirm-btn {
            position: absolute;
            bottom: 20%;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid var(--gold-dim);
            color: var(--gold-dim);
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        #final-stage .confirm-btn.visible {
            opacity: 1;
            pointer-events: all;
        }

        #final-stage .confirm-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .play-stage {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        #final-stage .play-stage.visible {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        #final-stage .bamboo-container {
            position: relative;
            width: 70%;
            max-width: 900px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -5%;
        }

        #final-stage #final-bamboo-pipe {
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 5;
            filter: sepia(0.8) brightness(0.85) contrast(1.1);
            transition: filter 0.5s ease;
        }

        #final-stage #final-bamboo-pipe.glowing {
            filter: sepia(0.6) brightness(1.0) contrast(1.1);
            animation: pipeGlow 3s ease-in-out infinite;
        }

        #final-stage .holes-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        #final-stage .hole {
            position: absolute;
            width: var(--hole-size);
            height: var(--hole-size);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.15s ease;
        }

        #final-stage .hole.drilled {
            background: radial-gradient(circle at 30% 30%, #2a1f15 0%, #1a120a 40%, #3d2818 70%, #5a3a20 100%);
            border: 1px solid #4a3020;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 6px rgba(90, 58, 32, 0.6);
        }

        #final-stage .hole.active {
            box-shadow:
                inset 0 0 8px rgba(0,0,0,0.8),
                0 0 15px rgba(201, 169, 110, 0.8),
                0 0 30px rgba(201, 169, 110, 0.4);
            border-color: var(--gold);
        }

        #final-stage .hole.membrane-covered {
            background: radial-gradient(circle at 30% 30%, rgba(232, 213, 168, 0.3) 0%, rgba(201, 169, 110, 0.15) 50%, transparent 100%);
            box-shadow:
                inset 0 0 8px rgba(0,0,0,0.6),
                0 0 8px rgba(201, 169, 110, 0.3);
        }

        #final-stage .vibration {
            position: absolute;
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
        }

        @keyframes vibrate {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.6; }
            100% { width: 50px; height: 50px; opacity: 0; }
        }

        #final-stage .sound-wave {
            position: absolute;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes finalWaveExpand {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.8; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        #final-stage .hint-1 { left: 38%; top: 62%; }
        #final-stage .hint-2 { left: 48%; top: 62%; }
        #final-stage .hint-3 { left: 58%; top: 62%; }
        #final-stage .hint-4 { left: 68%; top: 62%; }
        #final-stage .hint-5 { left: 78%; top: 62%; }
        #final-stage .hint-6 { left: 88%; top: 62%; }
        #final-stage .hint-7 { left: 12%; top: 62%; }

        #final-stage .key-hint {
            position: absolute;
            font-size: 10px;
            color: var(--gold-dim);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.6;
            transition: all 0.2s;
        }

        #final-stage .key-hint.active {
            color: var(--gold);
            opacity: 1;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(201, 169, 110, 0.5);
        }

        #final-stage .note-display {
            position: absolute;
            top: 18%;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 4px;
            font-family: "Noto Serif SC", serif;
            opacity: 0;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .note-display.visible {
            opacity: 1;
        }

        #final-stage .note-name {
            font-size: 1rem;
            color: var(--gold-dim);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        #final-stage .stage-text {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--gold);
            opacity: 0.9;
            transition: all 0.5s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #final-stage .stage-text.sub {
            font-size: 0.9rem;
            color: var(--gold-dim);
            bottom: 11%;
            letter-spacing: 2px;
        }

        #final-stage .end-buttons {
            position: absolute;
            bottom: 22%;
            display: flex;
            gap: 40px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s ease;
            z-index: 15;
        }

        #final-stage .end-buttons.visible {
            opacity: 1;
            pointer-events: all;
        }

        #final-stage .end-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--gold-dim);
            background: transparent;
            color: var(--gold);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        #final-stage .end-btn:hover {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(201, 169, 110, 0.4);
            transform: scale(1.1);
        }

        #final-stage .end-btn.restart {
            font-size: 12px;
            writing-mode: horizontal-tb;
            padding: 0 8px;
            text-align: center;
            line-height: 1.3;
        }

        #final-stage .end-btn.arrow {
            font-size: 24px;
        }

        @media (max-width: 768px) {
            .bamboo-selection {
                width: 94%;
                gap: 8px;
            }
            .bamboo-item { width: 28%; }
            .stage-text { top: 10%; font-size: 1rem; }
            .stage-sub { top: 16%; font-size: 0.85rem; }
            .chisel-tool { right: 4%; width: 60px; height: 60px; }
            .swipe-hint { left: 3%; }
            .progress-container { width: 78%; }
        }

        @media (max-width: 768px) {
            #final-stage .membrane-options {
                gap: 30px;
                flex-direction: column;
            }
            #final-stage .membrane-icon {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }
            #final-stage .bamboo-container {
                width: 95%;
            }
            #final-stage .hole {
                width: 24px;
                height: 24px;
            }
            #final-stage .note-display {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<!-- ======================================== -->
<!-- === STAGE 1: PARALLAX BAMBOO SELECTION === -->
<!-- ======================================== -->
<div class="parallax-scene" id="parallaxStage">
    <!-- Top Progress Bar -->
    <div class="parallax-progress" id="parallaxProgress"><div class="parallax-progress-fill" id="parallaxProgressFill"></div></div>

    <!-- Fixed Background -->
    <div class="bg-fixed"><img src="图片/bg.png" alt=""></div>

    <!-- 新 1 — far bamboo, LEFT side, zooms past -->
    <div class="layer layer-xin clickable" id="layerXin" data-bamboo="xin">
        <img src="图片/新 1.png" alt="新竹">
    </div>
    <!-- 歪 — near bamboo, RIGHT side when selectable, zooms past -->
    <div class="layer layer-wai clickable" id="layerWai" data-bamboo="wai">
        <img src="图片/歪.png" alt="歪竹">
    </div>
    <!-- 直 1 — mid bamboo, approaches center, final focus -->
    <div class="layer layer-zhi clickable" id="layerZhi" data-bamboo="zhi">
        <img src="图片/直 1.png" alt="直竹">
    </div>

    <!-- White Circle Button -->
    <div class="circle-btn" id="circleBtn"><div class="circle-inner"></div></div>
    <!-- Circle Tooltip -->
    <div class="circle-tooltip" id="circleTooltip"><div class="tt-text" id="circleTtText"></div></div>
</div>

<!-- Back Button (global, positioned fixed) -->
<button class="back-btn" id="backBtn" title="返回">
    <svg viewBox="0 0 24 24"><path d="M15 18 L9 12 L15 6"/></svg>
</button>

<!-- Step Indicator (parallax sub-steps, fixed position) -->
<div class="step-indicator" id="stepIndicator">
    <div class="step-label-group">
        <span class="step-label-text">择竹</span>
        <div class="step-gold-dot"></div>
    </div>
    <div class="step-dots">
        <div class="step-dot active" data-idx="0"></div>
        <div class="step-dot" data-idx="1"></div>
        <div class="step-dot" data-idx="2"></div>
    </div>
</div>

<!-- ======================================== -->
<!-- === GLOBAL ELEMENTS === -->
<!-- ======================================== -->

<div id="bg-layer"></div>
<div class="fire-glow"></div>

<div class="nav-dots" id="navDots">
    <div class="dot-wrapper active"><div class="dot active"></div><div class="dot-label">择竹</div></div>
    <div class="dot-wrapper"><div class="dot"></div><div class="dot-label">汗青</div></div>
    <div class="dot-wrapper"><div class="dot"></div><div class="dot-label">开孔</div></div>
    <div class="dot-wrapper"><div class="dot"></div><div class="dot-label">试音</div></div>
</div>

<div class="select-badge" id="selectBadge"></div>
<div class="scroll-hint pulse" id="scrollHint">滚轮滑动 · 深入丛林</div>

<!-- ======================================== -->
<!-- === STAGE 2-3: BAKE / DRILL === -->
<!-- ======================================== -->

<div id="bake-stage" class="stage-panel hidden">
    <div class="stage-text" id="main-text">新竹砍下需要阴干2年以上</div>
    <div class="stage-sub" id="sub-text">烘烤去湿可防止竹笛后期开裂</div>

    <div class="bamboo-container" id="bamboo-container">
        <img class="furnace" src="图片/炉.png" alt="炉" />
        <img id="bamboo-pipe" src="图片/干.png" alt="竹管">
        <div class="steam" id="steam">
            <div class="steam-particle" style="left: 22%; bottom: 28%;"></div>
            <div class="steam-particle" style="left: 42%; bottom: 36%; animation-delay: 0.2s;"></div>
            <div class="steam-particle" style="left: 62%; bottom: 32%; animation-delay: 0.5s;"></div>
            <div class="steam-particle" style="left: 78%; bottom: 40%; animation-delay: 0.8s;"></div>
        </div>
        <div class="node-clear-animation" id="clear-animation">
            <div class="clear-particle" style="left: 24%; top: 50%;"></div>
            <div class="clear-particle" style="left: 50%; top: 50%; animation-delay: 0.2s;"></div>
            <div class="clear-particle" style="left: 76%; top: 50%; animation-delay: 0.4s;"></div>
        </div>
    </div>

    <div class="swipe-hint" id="swipe-hint">
        <div class="swipe-arrow">
            <svg viewBox="0 0 30 40"><path d="M15 35 L15 5 M5 15 L15 5 L25 15" /></svg>
            <svg viewBox="0 0 30 40" style="transform: rotate(180deg);"><path d="M15 35 L15 5 M5 15 L15 5 L25 15" /></svg>
        </div>
        <div class="swipe-text">来回滑动烘烤竹管</div>
    </div>

    <div class="swipe-counter" id="swipe-counter">
        <div class="swipe-dot" id="dot-1"></div>
        <div class="swipe-dot" id="dot-2"></div>
        <div class="swipe-dot" id="dot-3"></div>
    </div>

    <button class="chisel-tool" id="chisel-tool" aria-label="凿子">
        <svg viewBox="0 0 24 24">
            <path d="M4 20 L8 16 L18 6 L20 4 L22 6 L20 8 L10 18 L6 22 Z" />
            <path d="M16 4 L20 8" stroke-linecap="round"/>
            <path d="M8 16 L10 18" stroke-linecap="round"/>
        </svg>
    </button>
    <div class="chisel-hint" id="chisel-hint">完成烘烤后点击凿子打通内节</div>
    <div class="progress-container" id="progress-container"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="holes-layer" id="holes-layer" style="display:none;">
        <div class="hole ink-mark hole-1" data-index="0" data-name="吹孔" data-note="上" data-tone="宫"></div>
        <div class="hole-label label-1">吹孔</div>
        <div class="hole ink-mark hole-2" data-index="1" data-name="膜孔" data-note="尺" data-tone="商"></div>
        <div class="hole-label label-2">膜孔</div>
        <div class="hole ink-mark hole-3" data-index="2" data-name="第一音孔" data-note="工" data-tone="角"></div>
        <div class="hole-label label-3">一孔</div>
        <div class="hole ink-mark hole-4" data-index="3" data-name="第二音孔" data-note="凡" data-tone="徵"></div>
        <div class="hole-label label-4">二孔</div>
        <div class="hole ink-mark hole-5" data-index="4" data-name="第三音孔" data-note="六" data-tone="羽"></div>
        <div class="hole-label label-5">三孔</div>
        <div class="hole ink-mark hole-6" data-index="5" data-name="第四音孔" data-note="五" data-tone="变宫"></div>
        <div class="hole-label label-6">四孔</div>
        <div class="hole ink-mark hole-7" data-index="6" data-name="第五音孔" data-note="乙" data-tone="变徵"></div>
        <div class="hole-label label-7">五孔</div>
        <div class="hole ink-mark hole-8" data-index="7" data-name="第六音孔" data-note="仩" data-tone="清角"></div>
        <div class="hole-label label-8">六孔</div>
    </div>

    <div class="scale-overlay" id="scale-overlay">
        <div class="scale-title">竹笛开孔节奏</div>
        <div class="scale-content">
            <div class="scale-item"><div class="scale-note">宫</div><div class="scale-name">吹孔</div></div>
            <div class="scale-line"></div>
            <div class="scale-item"><div class="scale-note">商</div><div class="scale-name">膜孔</div></div>
            <div class="scale-line"></div>
            <div class="scale-item"><div class="scale-note">角</div><div class="scale-name">一孔</div></div>
            <div class="scale-line"></div>
            <div class="scale-item"><div class="scale-note">徵</div><div class="scale-name">二孔</div></div>
        </div>
    </div>

    <div class="gongche-panel" id="gongche-panel">
        <div class="gongche-title">工尺谱</div>
        <div id="gongche-chars"></div>
    </div>
</div>

<!-- ======================================== -->
<!-- === STAGE 4: 试音 (FINAL) === -->
<!-- ======================================== -->

<div id="final-stage" class="final-stage" aria-label="试音工序">
    <div id="final-bg-layer"></div>

    <div class="membrane-stage" id="final-membrane-stage">
        <div class="membrane-title">笛膜为魂，采芦苇内膜，薄如蝉翼，透似轻纱</div>
        <div class="membrane-sub">请选择膜材，贴于膜孔之上</div>

        <div class="membrane-options">
            <div class="membrane-item" data-type="reed" data-desc="清亮高亢">
                <div class="membrane-icon">苇</div>
                <div class="membrane-name">芦苇膜</div>
                <div class="membrane-desc">音色清亮</div>
            </div>
            <div class="membrane-item" data-type="bamboo" data-desc="温润醇厚">
                <div class="membrane-icon">竹</div>
                <div class="membrane-name">竹膜</div>
                <div class="membrane-desc">音色温润</div>
            </div>
            <div class="membrane-item" data-type="paper" data-desc="浑厚低沉">
                <div class="membrane-icon">纸</div>
                <div class="membrane-name">纸膜</div>
                <div class="membrane-desc">音色浑厚</div>
            </div>
        </div>

        <button class="confirm-btn" id="final-confirm-btn">确认贴膜</button>
    </div>

    <div class="play-stage" id="final-play-stage">
        <div class="note-display" id="final-note-display">
            <div id="final-note-char"></div>
            <div class="note-name" id="final-note-name"></div>
        </div>

        <div class="bamboo-container" id="final-bamboo-container">
            <img id="final-bamboo-pipe" src="图片/干.png" alt="竹管">

            <div class="holes-layer" id="final-holes-layer">
                <div class="hole drilled hole-1" id="final-hole-1"></div>
                <div class="hole drilled hole-2" id="final-hole-2"></div>
                <div class="hole drilled hole-3" id="final-hole-3"></div>
                <div class="hole drilled hole-4" id="final-hole-4"></div>
                <div class="hole drilled hole-5" id="final-hole-5"></div>
                <div class="hole drilled hole-6" id="final-hole-6"></div>
                <div class="hole drilled hole-7" id="final-hole-7"></div>
                <div class="hole drilled hole-8" id="final-hole-8"></div>

                <div class="key-hint hint-1">1</div>
                <div class="key-hint hint-2">2</div>
                <div class="key-hint hint-3">3</div>
                <div class="key-hint hint-4">4</div>
                <div class="key-hint hint-5">5</div>
                <div class="key-hint hint-6">6</div>
                <div class="key-hint hint-7">7</div>
            </div>
        </div>
    </div>

    <div class="stage-text" id="final-main-text">笛开七孔，上应七星。五声二变，清浊自辨</div>
    <div class="stage-text sub" id="final-sub-text">按键盘数字键 1-7 吹奏音阶</div>

    <div class="end-buttons" id="final-end-buttons">
        <button class="end-btn restart" id="final-restart-btn" title="再次体验">再次<br>体验</button>
        <button class="end-btn arrow" id="final-arrow-btn" title="向下">↓</button>
    </div>
</div>

<!-- ======================================== -->
<!-- === COMPLETE OVERLAY === -->
<!-- ======================================== -->

<div class="complete-overlay" id="complete-overlay">
    <div class="complete-text">汗青完成</div>
    <div class="complete-sub">竹管已去湿定型，内节已通</div>
</div>

<script>
// ============================================================
// === SHARED AUDIO HELPERS ===
// ============================================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBakeSound() {
    if (!audioCtx) return;
    const noise = audioCtx.createBufferSource();
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    noise.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(90 + Math.random() * 40, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function playChiselSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
    const noise = audioCtx.createBufferSource();
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2;
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    noise.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start();
}

function playDrillSound() {
    if (!audioCtx) return;
    const noise = audioCtx.createBufferSource();
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.35;
    }
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    noise.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120 + Math.random() * 60, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function playCompleteSound() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.15 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.8);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * 0.15);
        osc.stop(audioCtx.currentTime + i * 0.15 + 0.8);
    });
}

// ============================================================
// === STAGE 1: PARALLAX BAMBOO SELECTION ===
// ============================================================

// DOM
const parallaxStage = document.getElementById('parallaxStage');
const L = {
    xin: document.getElementById('layerXin'),
    wai: document.getElementById('layerWai'),
    zhi: document.getElementById('layerZhi'),
};
const circleBtn    = document.getElementById('circleBtn');
const circleTL     = document.getElementById('circleTooltip');
const circleTt     = document.getElementById('circleTtText');
const selectBadge  = document.getElementById('selectBadge');
const scrollHint   = document.getElementById('scrollHint');
const parallaxProgressFill = document.getElementById('parallaxProgressFill');
const stepDots     = document.querySelectorAll('.step-dot');
const stepIndicator = document.getElementById('stepIndicator');
const backBtn      = document.getElementById('backBtn');

const allLayers    = [L.xin, L.wai, L.zhi];
const BAMBOO_NAME  = { xin:'嫩竹 · 不宜', wai:'歪竹 · 弃用', zhi:'直竹 · 已选 ✓' };

// Design base 1440×900
const DW = 1440, DH = 900;

// Keyframes: walk-forward into forest
const KF = {
    // 新 1 — far bamboo, LEFT side. Appears in focus → zooms past → gone.
    xin: [
        { p:0,    x:  2, y: -5, w: 44, h: 88, o:1.0  },
        { p:0.25, x:-18, y:-20, w: 85, h:170, o:0.40 },
        { p:0.5,  x:-50, y:-45, w:150, h:300, o:0    },
    ],
    // 歪 — near bamboo, RIGHT side when selectable → zooms past right.
    wai: [
        { p:0,    x: 72, y: 12, w:  8, h: 16, o:0.08 },
        { p:0.5,  x: 46, y: -6, w: 38, h: 74, o:1.0  },
        { p:0.7,  x: 22, y:-20, w: 68, h:130, o:0.50 },
        { p:1.0,  x:-25, y:-40, w:120, h:230, o:0    },
    ],
    // 直 1 — mid bamboo, approaches from right, becomes final hero.
    zhi: [
        { p:0,    x: 72, y:  8, w:  8, h: 16, o:0.05 },
        { p:0.5,  x: 46, y:  0, w: 20, h: 40, o:0.25 },
        { p:1.0,  x: 20, y: -6, w: 48, h: 94, o:1.0  },
    ],
    // White circle — follows the active bamboo
    circle: [
        { p:0,    x: 16, y: 58 },
        { p:0.5,  x: 58, y: 52 },
        { p:1.0,  x: 36, y: 54 },
    ],
};

function getTooltipText(p) {
    if (p < 0.25) return '应取3年以上的老竹，直径2-3公分';
    if (p < 0.65) return '剔除歪斜虫蛀之竹，择其笔直者';
    return '应取质地均匀、壁厚杆直、无虫蛀的竹材';
}

// Helpers
function lerp(a,b,t) { return a+(b-a)*t; }
function ease(t) { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function lerpKF(arr, p) {
    let lo = arr[0], hi = arr[arr.length-1];
    for (let i=0; i<arr.length-1; i++) {
        if (p >= arr[i].p && p <= arr[i+1].p) { lo=arr[i]; hi=arr[i+1]; break; }
    }
    if (p <= arr[0].p)       { lo=arr[0]; hi=arr[0]; }
    if (p >= arr[arr.length-1].p) { lo=arr[arr.length-1]; hi=arr[arr.length-1]; }
    const range = hi.p - lo.p || 0.001;
    const t = ease((p - lo.p) / range);
    const out = {};
    for (const k of Object.keys(lo)) { if (k==='p') continue; out[k] = lerp(lo[k], hi[k], t); }
    return out;
}

// Parallax state
let parallaxActive   = true;
let scrollTarget     = 0;
let scrollProgress   = 0;
let lastProgress     = 0;
let lastInputTime    = 0;
let parallaxAnimId   = null;
let selected         = null;
let activeDot        = 0;  // step dot index with hysteresis

const SNAP_POINTS       = [0, 0.5, 1.0];
const SNAP_THRESHOLD    = 0.07;
const SNAP_IDLE_MS      = 300;
const SMOOTHING         = 0.12;
const SENSITIVITY       = 0.0012;

// Apply all layers at given progress
function apply(p) {
    const xi = lerpKF(KF.xin, p);
    L.xin.style.transform = `translate(${xi.x}vw,${xi.y}vh) scaleX(-1) rotate(13.68deg)`;
    L.xin.style.width  = xi.w+'vw'; L.xin.style.height = xi.h+'vh';
    L.xin.style.opacity = xi.o;

    const wa = lerpKF(KF.wai, p);
    L.wai.style.transform = `translate(${wa.x}vw,${wa.y}vh)`;
    L.wai.style.width  = wa.w+'vw'; L.wai.style.height = wa.h+'vh';
    L.wai.style.opacity = wa.o;

    const zh = lerpKF(KF.zhi, p);
    L.zhi.style.transform = `translate(${zh.x}vw,${zh.y}vh) scaleX(-1)`;
    L.zhi.style.width  = zh.w+'vw'; L.zhi.style.height = zh.h+'vh';
    L.zhi.style.opacity = zh.o;

    const ci = lerpKF(KF.circle, p);
    circleBtn.style.transform = `translate(${ci.x}vw,${ci.y}vh)`;

    // Top progress bar
    parallaxProgressFill.style.width = (p * 100) + '%';

    // Step dots with hysteresis
    const prevDot = activeDot;
    if      (p > 0.28 && activeDot===0) activeDot = 1;
    else if (p < 0.22 && activeDot===1) activeDot = 0;
    else if (p > 0.68 && activeDot===1) activeDot = 2;
    else if (p < 0.62 && activeDot===2) activeDot = 1;
    if (activeDot !== prevDot) {
        stepDots.forEach((d,i) => d.classList.toggle('active', i===activeDot));
    }

    // Scroll hint
    scrollHint.classList.toggle('pulse', p < 0.85);
    if      (p < 0.15) scrollHint.textContent = '滚轮滑动 · 深入丛林';
    else if (p < 0.4)  scrollHint.textContent = '继续深入 · 辨识竹材';
    else if (p < 0.85) scrollHint.textContent = '仔细甄别 · 择其良者';
    else               scrollHint.textContent = '择竹将毕 · 直竹已现';
}

// Animation loop
function parallaxLoop() {
    if (!parallaxActive) { parallaxAnimId = null; return; }

    const idle = performance.now() - lastInputTime;
    let effectiveTarget = scrollTarget;

    if (idle > SNAP_IDLE_MS) {
        for (const sp of SNAP_POINTS) {
            if (Math.abs(scrollProgress - sp) < SNAP_THRESHOLD) {
                effectiveTarget = sp; break;
            }
        }
    }

    lastProgress = scrollProgress;
    scrollProgress += (effectiveTarget - scrollProgress) * SMOOTHING;
    scrollProgress = Math.max(0, Math.min(1, scrollProgress));

    apply(scrollProgress);
    parallaxAnimId = requestAnimationFrame(parallaxLoop);
}

function startParallaxLoop() {
    if (!parallaxAnimId) { lastProgress = scrollProgress; parallaxAnimId = requestAnimationFrame(parallaxLoop); }
}

// Input: Wheel
window.addEventListener('wheel', e => {
    if (!parallaxActive) return;
    e.preventDefault();
    scrollTarget += e.deltaY * SENSITIVITY;
    scrollTarget = Math.max(0, Math.min(1, scrollTarget));
    lastInputTime = performance.now();
    startParallaxLoop();
}, { passive: false });

// Input: Keyboard
window.addEventListener('keydown', e => {
    if (!parallaxActive) return;
    if (e.key==='ArrowRight'||e.key==='ArrowDown') {
        e.preventDefault(); scrollTarget = Math.min(1, scrollTarget+0.08); lastInputTime = performance.now(); startParallaxLoop();
    } else if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
        e.preventDefault(); scrollTarget = Math.max(0, scrollTarget-0.08); lastInputTime = performance.now(); startParallaxLoop();
    }
});

// Input: Touch
let tY=0, tStart=0;
window.addEventListener('touchstart', e => {
    if (!parallaxActive) return;
    if (e.touches.length===1) { tY=e.touches[0].clientY; tStart=scrollTarget; lastInputTime = performance.now(); }
}, {passive:false});
window.addEventListener('touchmove', e => {
    if (!parallaxActive) return;
    if (e.touches.length===1) {
        const dy = tY - e.touches[0].clientY;
        scrollTarget = Math.max(0, Math.min(1, tStart + dy * SENSITIVITY));
        lastInputTime = performance.now();
        startParallaxLoop();
    }
}, {passive:false});

// Step dots click — snap to bamboo view
stepDots.forEach(d => {
    d.addEventListener('click', function(e) {
        if (!parallaxActive) return;
        e.stopPropagation();
        scrollTarget = SNAP_POINTS[parseInt(this.dataset.idx)];
        lastInputTime = 0; // snap immediately
        startParallaxLoop();
    });
});

// Back button — return to previous step or main page
backBtn.addEventListener('click', () => {
    if (phase && phase !== 'bake' && phase !== 'clear' && phase !== 'clearing' && phase !== 'drill' && phase !== 'tone' && phase !== 'done') {
        // Still in parallax stage (phase hasn't been set yet) — go to main page
        window.location.href = '../../index.html?instrument=%E7%AC%9B';
        return;
    }
    if (phase === 'bake' || phase === 'clear' || phase === 'clearing') {
        // In bake stage — go back to parallax (restart)
        location.reload();
        return;
    }
    if (phase === 'drill') {
        // In drill stage — go back to bake finish, but simpler: reload
        location.reload();
        return;
    }
    if (phase === 'tone' || phase === 'done') {
        // In final stage — go back to main page
        window.location.href = '../../index.html?instrument=%E7%AC%9B';
        return;
    }
    // Default: go to main page
    window.location.href = '../../index.html?instrument=%E7%AC%9B';
});

// Bamboo selection
allLayers.forEach(layer => {
    layer.addEventListener('click', function(e) {
        if (!parallaxActive) return;
        e.stopPropagation();
        const type = this.dataset.bamboo;

        if (type === 'zhi') {
            // Good bamboo — transition to bake stage
            initAudio();
            allLayers.forEach(l=>l.classList.remove('selected'));
            this.classList.add('selected');
            selected = type;
            selectBadge.textContent = BAMBOO_NAME[type];
            selectBadge.classList.add('show');
            scrollHint.textContent = '良竹已择 · 进入汗青工序';
            scrollHint.classList.remove('pulse');

            setTimeout(() => {
                selectBadge.classList.remove('show');
                transitionToBake();
            }, 900);
            return;
        }

        // Bad bamboo — give feedback
        initAudio();
        // Visual shake
        this.classList.add('bad-shake');
        // Store current transform to restore
        const savedTransform = this.style.transform;
        this.style.setProperty('--sx', '0px');
        this.style.setProperty('--sy', '0px');
        setTimeout(() => {
            this.classList.remove('bad-shake');
            this.style.transform = savedTransform;
        }, 400);

        // Show badge
        if (selected === type) {
            selected = null;
            this.classList.remove('selected');
            selectBadge.classList.remove('show');
        } else {
            allLayers.forEach(l=>l.classList.remove('selected'));
            selected = type;
            this.classList.add('selected');
            selectBadge.textContent = BAMBOO_NAME[type];
            selectBadge.classList.add('show');
            clearTimeout(this._t);
            this._t = setTimeout(() => selectBadge.classList.remove('show'), 2000);
        }

        // Update scroll hint
        if (type === 'xin') {
            scrollHint.textContent = '嫩竹不堪用 · 继续寻觅';
        } else if (type === 'wai') {
            scrollHint.textContent = '歪竹不可取 · 再择良材';
        }
    });
});

// Circle tooltip
function posTooltip() {
    const text = getTooltipText(scrollProgress);
    circleTt.textContent = text;
    const r = circleBtn.getBoundingClientRect();
    circleTL.style.left = (r.left + r.width/2) + 'px';
    circleTL.style.top  = (r.top - 22) + 'px';
    circleTL.style.transform = 'translate(-50%, -100%)';
}
circleBtn.addEventListener('mouseenter', () => { posTooltip(); circleTL.classList.add('visible'); });
circleBtn.addEventListener('mouseleave', () => circleTL.classList.remove('visible'));
circleBtn.addEventListener('mousemove', posTooltip);
window.addEventListener('resize', () => { if (parallaxActive) { apply(scrollProgress); posTooltip(); } });

// ============================================================
// === TRANSITION: PARALLAX → BAKE ===
// ============================================================

function transitionToBake() {
    parallaxActive = false;
    if (parallaxAnimId) cancelAnimationFrame(parallaxAnimId);
    parallaxStage.classList.add('hidden');
    selectBadge.classList.remove('show');
    scrollHint.style.opacity = '0';
    stepIndicator.style.opacity = '0';
    parallaxProgressFill.style.width = '100%';
    showBakeStage();
}

// ============================================================
// === STAGE 2-3: BAKE & DRILL ===
// ============================================================

const stageBake = document.getElementById('bake-stage');
const finalStage = document.getElementById('final-stage');
const bgLayer = document.getElementById('bg-layer');
const navDots = document.getElementById('navDots');
const navDotWrappers = document.querySelectorAll('.dot-wrapper');

const bambooPipe = document.getElementById('bamboo-pipe');
const bambooContainer = document.getElementById('bamboo-container');
const swipeHint = document.getElementById('swipe-hint');
const swipeCounter = document.getElementById('swipe-counter');
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');
const steamEl = document.getElementById('steam');
const mainText = document.getElementById('main-text');
const subText = document.getElementById('sub-text');
const chiselTool = document.getElementById('chisel-tool');
const chiselHint = document.getElementById('chisel-hint');
const clearAnimation = document.getElementById('clear-animation');
const holesLayer = document.getElementById('holes-layer');
const scaleOverlay = document.getElementById('scale-overlay');
const gongchePanel = document.getElementById('gongche-panel');
const gongcheChars = document.getElementById('gongche-chars');
const completeOverlay = document.getElementById('complete-overlay');
const fireGlow = document.querySelector('.fire-glow');

function setNavStage(index) {
    navDotWrappers.forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        const circle = dot.querySelector('.dot');
        circle.classList.remove('active', 'completed');
        if (i < index) {
            dot.classList.add('completed');
            circle.classList.add('completed');
        } else if (i === index) {
            dot.classList.add('active');
            circle.classList.add('active');
        }
    });
}

function showBakeStage() {
    // Show global elements for bake stage
    navDots.classList.add('visible');
    bgLayer.style.display = 'block';
    fireGlow.style.display = 'block';
    fireGlow.style.opacity = '0.8';

    stageBake.classList.remove('hidden');
    setNavStage(1);
    swipeHint.classList.remove('hidden');
    progressContainer.style.opacity = '0';
    swipeCounter.classList.remove('visible');
    bgLayer.style.transform = 'scale(1)';
    bambooOffset = 0;
    bambooPipe.style.setProperty('--bamboo-offset', '0px');
    mainText.innerText = '新竹砍下需要阴干2年以上';
    subText.innerText = '烘烤去湿可防止竹笛后期开裂';
    bambooPipe.classList.remove('baked', 'baking');
    clearClicks = 0;
    swipeCount = 0;
    updateSwipeCounter();
    progressBar.style.width = '0%';
    completeOverlay.classList.remove('active');
    chiselTool.classList.remove('active');
    chiselTool.style.display = 'flex';
    chiselHint.classList.remove('visible');
    chiselHint.style.display = 'block';
    holesLayer.style.display = 'none';
    holesLayer.querySelectorAll('.hole').forEach(hole => {
        hole.classList.remove('drilled');
        hole.classList.add('ink-mark');
    });
    gongchePanel.classList.remove('visible');
    scaleOverlay.classList.remove('visible');
    gongcheChars.innerHTML = '';
}

// ============================================================
// === BAKE: Drag / Swipe logic ===
// ============================================================

function getY(e) {
    return e.touches ? e.touches[0].clientY : e.clientY;
}

let isDragging = false;
let lastY = 0;
let direction = 0;
let lastDirection = 0;
let swipeCount = 0;
const TOTAL_SWIPES_NEEDED = 3;
let phase = 'bake';
let clearClicks = 0;
const TOTAL_CLEAR_CLICKS = 3;
let bambooOffset = 0;
const MAX_BAMBOO_OFFSET = 28;
const MIN_BAMBOO_OFFSET = -28;

function handleStart(e) {
    if (phase !== 'bake') return;
    initAudio();
    isDragging = true;
    lastY = getY(e);
    direction = 0;
    lastDirection = 0;
    bambooPipe.classList.add('baking');
    steamEl.classList.add('active');
    progressContainer.style.opacity = '1';
    swipeCounter.classList.add('visible');
    bambooContainer.classList.add('grabbing');
}

function handleMove(e) {
    if (!isDragging || phase !== 'bake') return;
    e.preventDefault();
    const currentY = getY(e);
    const delta = currentY - lastY;
    if (Math.abs(delta) > 15) {
        const newDirection = delta > 0 ? 1 : -1;
        bambooOffset = Math.max(MIN_BAMBOO_OFFSET, Math.min(MAX_BAMBOO_OFFSET, bambooOffset + delta * 0.16));
        bambooPipe.style.setProperty('--bamboo-offset', `${bambooOffset}px`);
        if (lastDirection !== 0 && newDirection !== lastDirection) {
            swipeCount++;
            updateSwipeCounter();
            playBakeSound();
            const progress = Math.min((swipeCount / TOTAL_SWIPES_NEEDED) * 100, 100);
            progressBar.style.width = progress + '%';
            if (swipeCount === 1) {
                mainText.innerText = '竹管受热，水分开始蒸发';
            } else if (swipeCount === 2) {
                mainText.innerText = '色泽转深，竹质紧实';
            }
        }
        lastDirection = newDirection;
        lastY = currentY;
    }
    if (swipeCount >= TOTAL_SWIPES_NEEDED && phase === 'bake') {
        finishBaking();
    }
}

function handleEnd() {
    isDragging = false;
    bambooPipe.classList.remove('baking');
    steamEl.classList.remove('active');
    bambooContainer.classList.remove('grabbing');
}

function updateSwipeCounter() {
    for (let i = 1; i <= TOTAL_SWIPES_NEEDED; i++) {
        const dot = document.getElementById('dot-' + i);
        if (dot) dot.classList.toggle('active', i <= swipeCount);
    }
}

const furnace = document.querySelector('.furnace');

function finishBaking() {
    phase = 'clear';
    bambooPipe.classList.add('baked');
    swipeHint.classList.add('hidden');
    swipeCounter.style.opacity = '0';
    progressContainer.style.opacity = '0';
    furnace.classList.add('hidden');
    bambooPipe.style.transform = 'translateX(-50%) translateY(0) scale(0.85) rotate(0deg)';
    bambooPipe.style.bottom = '25%';
    mainText.innerText = '烘烤完成，点击右侧凿子打通内节';
    subText.innerText = '通节修内是为了保证气流通畅，为开孔调音打下基础';
    chiselTool.classList.add('active');
    chiselHint.classList.add('visible');
    bambooPipe.style.animation = 'pulse 2s ease-in-out infinite';
}

function handleChiselClick(e) {
    if (phase !== 'clear' && phase !== 'clearing') return;
    e.preventDefault();
    e.stopPropagation();
    initAudio();
    phase = 'clearing';
    clearClicks++;
    chiselTool.classList.remove('clicking');
    void chiselTool.offsetWidth;
    chiselTool.classList.add('clicking');
    playChiselSound();
    bambooPipe.style.animation = 'shake 0.3s ease-in-out';
    setTimeout(() => {
        if (phase === 'clearing' || phase === 'clear') {
            bambooPipe.style.animation = 'pulse 2s ease-in-out infinite';
        }
    }, 300);
    const particles = clearAnimation.querySelectorAll('.clear-particle');
    particles.forEach((p, i) => {
        setTimeout(() => {
            p.style.animation = 'none';
            void p.offsetWidth;
            p.style.animation = 'clearBurst 0.5s ease-out forwards';
        }, i * 100);
    });
    clearAnimation.classList.add('active');
    setTimeout(() => clearAnimation.classList.remove('active'), 600);
    if (clearClicks === 1) {
        mainText.innerText = '凿子破节，竹屑纷飞';
    } else if (clearClicks === 2) {
        mainText.innerText = '内节渐通，气流将畅';
    }
    if (clearClicks >= TOTAL_CLEAR_CLICKS) {
        finishClearing();
    }
}

function finishClearing() {
    phase = 'done';
    chiselTool.classList.remove('active');
    chiselHint.classList.remove('visible');
    bambooPipe.style.animation = '';
    mainText.innerText = '内节已通，气流通畅';
    subText.innerText = '竹管内外壁已修整平滑';
    setTimeout(() => {
        playCompleteSound();
        completeOverlay.querySelector('.complete-text').innerText = '汗青完成';
        completeOverlay.querySelector('.complete-sub').innerText = '准备进入第三步：开孔';
        completeOverlay.classList.add('active');
        setTimeout(() => {
            completeOverlay.classList.remove('active');
            showDrillStage();
        }, 1400);
    }, 400);
}

function showDrillStage() {
    phase = 'drill';
    setNavStage(2);
    finalStage.classList.remove('visible');
    holesLayer.style.display = 'block';
    holesLayer.querySelectorAll('.hole').forEach(hole => {
        hole.classList.remove('drilled');
        hole.classList.add('ink-mark');
    });
    drilledCount = 0;
    gongcheChars.innerHTML = '';
    gongchePanel.classList.remove('visible');
    scaleOverlay.classList.remove('visible');
    mainText.innerText = '开孔工序开始';
    subText.innerText = '点击竹管上的墨线标记逐一开孔';
    completeOverlay.classList.remove('active');
    chiselTool.style.display = 'none';
    chiselHint.style.display = 'none';
    scaleOverlay.style.display = 'none';
    progressContainer.style.opacity = '0';
    progressBar.style.width = '0%';
}

function createChips(x, y) {
    const container = bambooContainer;
    for (let i = 0; i < 8; i++) {
        const chip = document.createElement('div');
        chip.className = 'chip-particle';
        chip.style.left = x + 'px';
        chip.style.top = y + 'px';
        const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
        const distance = 20 + Math.random() * 40;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        chip.style.setProperty('--tx', tx + 'px');
        chip.style.setProperty('--ty', ty + 'px');
        chip.style.animation = `chipFly 0.6s ease-out forwards`;
        chip.style.animationDelay = (Math.random() * 0.1) + 's';
        container.appendChild(chip);
        setTimeout(() => chip.remove(), 700);
    }
}

function createSoundWave(x, y) {
    const wave = document.createElement('div');
    wave.className = 'sound-wave';
    wave.style.left = x + 'px';
    wave.style.top = y + 'px';
    wave.style.transform = 'translate(-50%, -50%)';
    wave.style.animation = 'waveExpand 0.8s ease-out forwards';
    bambooContainer.appendChild(wave);
    setTimeout(() => wave.remove(), 800);
}

function addGongcheChar(note, name, tone) {
    const item = document.createElement('div');
    item.className = 'gongche-item';
    const char = document.createElement('div');
    char.className = 'gongche-char';
    char.textContent = note;
    item.appendChild(char);
    gongcheChars.appendChild(item);
    requestAnimationFrame(() => {
        char.classList.add('visible');
    });
}

function drillHole(hole) {
    if (phase !== 'drill' || hole.classList.contains('drilled')) return;
    initAudio();
    playDrillSound();
    hole.classList.remove('ink-mark');
    hole.classList.add('drilled');
    const rect = hole.getBoundingClientRect();
    const containerRect = bambooContainer.getBoundingClientRect();
    const x = rect.left - containerRect.left + rect.width / 2;
    const y = rect.top - containerRect.top + rect.height / 2;
    createChips(x, y);
    createSoundWave(x, y);
    const name = hole.dataset.name;
    const note = hole.dataset.note;
    const tone = hole.dataset.tone;
    drilledCount++;
    gongchePanel.classList.add('visible');
    addGongcheChar(note, name, tone);
    mainText.innerText = `已开${name}，对应工尺谱「${note}」，${tone}音`;
    const remaining = TOTAL_HOLES - drilledCount;
    subText.innerText = remaining > 0 ? `还差 ${remaining} 个孔位` : '七孔俱全，上应七星';
    if (drilledCount >= TOTAL_HOLES) {
        setTimeout(() => {
            playCompleteSound();
            completeOverlay.querySelector('.complete-text').innerText = '七孔俱全';
            completeOverlay.querySelector('.complete-sub').innerText = '笛开孔完成，进入最后试音步骤';
            completeOverlay.classList.add('active');
            setNavStage(3);
            setTimeout(showToneStage, 1200);
        }, 600);
    }
}

function showToneStage() {
    phase = 'tone';
    stageBake.classList.add('hidden');
    finalStage.classList.add('visible');
    finalMembraneStage.classList.remove('hidden');
    finalPlayStage.classList.remove('visible');
    finalEndButtons.classList.remove('visible');
    finalMainText.innerText = '笛膜为魂，采芦苇内膜，薄如蝉翼，透似轻纱';
    finalSubText.innerText = '请选择膜材，贴于膜孔之上';
    completeOverlay.classList.remove('active');
    progressContainer.style.opacity = '0';
    progressBar.style.width = '0%';
    chiselTool.style.display = 'none';
    chiselHint.style.display = 'none';
    setNavStage(3);
}

// ============================================================
// === STAGE 4: 试音 (FINAL) ===
// ============================================================

const membraneTypes = {
    reed:   { name: '芦苇膜', brightness: 1.3, harmonic: [1, 0.6, 0.4, 0.2, 0.1], attack: 0.02, decay: 0.8 },
    bamboo: { name: '竹膜',   brightness: 1.0, harmonic: [1, 0.5, 0.3, 0.15, 0.08], attack: 0.03, decay: 1.0 },
    paper:  { name: '纸膜',   brightness: 0.7, harmonic: [1, 0.4, 0.5, 0.3, 0.2], attack: 0.05, decay: 1.2 }
};

let currentMembrane = null;
let selectedMembrane = null;

const noteFingerings = {
    '1': { freq: 293.66, name: '低音5', holes: [true, true, true, true, true, true] },
    '2': { freq: 329.63, name: '低音6', holes: [true, true, true, true, false, false] },
    '3': { freq: 369.99, name: '低音7', holes: [true, true, true, false, false, false] },
