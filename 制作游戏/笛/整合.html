<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笛韵千年——竹笛制作</title>
    <style>
        :root {
            --gold: #c9a96e;
            --gold-dim: #8a7a5a;
            --brown: #5a4a3a;
            --bg: #1a1a1a;
            --text: #fff;
            --hole-size: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 25%), var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('图片/bg.png') center/cover no-repeat;
            opacity: 0.15;
            pointer-events: none;
            transform-origin: center;
            transition: transform 0.2s ease-out;
        }

        .fire-glow {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 140px;
            background: radial-gradient(ellipse at center, rgba(201, 169, 110, 0.18) 0%, transparent 65%);
            border-radius: 50%;
            animation: firePulse 3.5s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes firePulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.75; transform: translateX(-50%) scale(1.08); }
        }

        .nav-dots {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            z-index: 10;
        }

        .dot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #444;
            border: 2px solid #555;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(201, 169, 110, 0.45);
        }

        .dot.completed {
            background: var(--gold-dim);
            border-color: var(--gold-dim);
        }

        .dot-label {
            font-size: 12px;
            color: #7f7f7f;
            letter-spacing: 2px;
            transition: color 0.4s ease;
            white-space: nowrap;
        }

        .dot-wrapper.active .dot-label,
        .dot-wrapper.completed .dot-label {
            color: var(--gold);
        }

        .stage-panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .stage-text {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            font-size: 1.15rem;
            letter-spacing: 2px;
            color: var(--gold);
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.35);
        }

        .stage-sub {
            position: absolute;
            top: 19%;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #b9a56b;
            letter-spacing: 1.5px;
            z-index: 2;
            opacity: 0.9;
        }

        .bamboo-selection {
            position: relative;
            width: 86%;
            max-width: 980px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4%;
            padding-top: 30px;
            margin-top: -40px;
            transition: transform 0.2s ease-out;
        }

        .bamboo-item {
            width: 18%;
            max-width: 180px;
            transition: transform 0.4s ease, filter 0.4s ease, opacity 0.4s ease;
            cursor: pointer;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bamboo-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .bamboo-item .item-label {
            margin-top: 14px;
            font-size: 0.95rem;
            color: #ccc;
            letter-spacing: 1px;
        }

        .bamboo-item:hover {
            transform: translateY(-8px) scale(1.05);
            filter: brightness(1.1);
        }

        .bamboo-item.inactive {
            filter: grayscale(1) brightness(0.7);
        }

        .bamboo-item.bad-click {
            animation: shake 0.35s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .bamboo-container {
            position: relative;
            width: auto;
            max-width: 200px;
            height: 420px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-top: -6%;
            z-index: 2;
            cursor: grab;
        }

        .bamboo-container.grabbing {
            cursor: grabbing;
        }

        #bamboo-pipe {
            width: auto;
            height: 280px;
            max-height: 280px;
            object-fit: contain;
            transition: all 0.5s ease;
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(var(--bamboo-offset, 0px)) scale(0.78);
            z-index: 5;
            filter: sepia(0.35) brightness(0.9);
        }

        #bamboo-pipe.baking {
            filter: sepia(0.6) brightness(1.05) saturate(1.2);
            transform: translateX(-50%) translateY(var(--bamboo-offset, 0px)) scale(0.82);
        }

        #bamboo-pipe.baked {
            filter: sepia(0.8) brightness(0.88) contrast(1.05);
            transform: translateX(-50%) translateY(0) scale(0.85) rotate(0deg);
        }


        .steam {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 4;
        }

        .steam.active {
            opacity: 1;
        }

        .steam-particle {
            position: absolute;
            width: 3px;
            height: 30px;
            background: linear-gradient(to top, rgba(201, 169, 110, 0.35), transparent);
            border-radius: 50%;
            animation: steamRise 2s ease-out infinite;
        }

        @keyframes steamRise {
            0% { transform: translateY(0) scaleX(1); opacity: 0.6; }
            100% { transform: translateY(-80px) scaleX(0.5); opacity: 0; }
        }

        .swipe-hint {
            position: absolute;
            left: 6%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0.85;
            transition: opacity 0.4s ease;
        }

        .swipe-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .swipe-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .swipe-arrow svg {
            width: 30px;
            height: 40px;
            stroke: var(--gold);
            stroke-width: 2;
            fill: none;
        }

        .swipe-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 4px;
            line-height: 1.8;
        }

        .swipe-counter {
            position: absolute;
            bottom: 34%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 18px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .swipe-counter.visible {
            opacity: 1;
        }

        .swipe-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            border: 1px solid #555;
            transition: all 0.3s ease;
        }

        .swipe-dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
        }

        .progress-container {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 62%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dim));
            transition: width 0.3s ease;
        }

        .chisel-tool {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            width: 72px;
            height: 72px;
            border: 2px solid var(--gold-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.55;
            transition: all 0.4s ease;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            z-index: 15;
        }

        .chisel-tool.active {
            opacity: 1;
            border-color: var(--gold);
            box-shadow: 0 0 22px rgba(201, 169, 110, 0.35);
        }

        .chisel-tool:hover.active {
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.45);
        }

        .chisel-tool:active.active {
            transform: translateY(-50%) scale(0.98);
        }

        .chisel-tool svg {
            width: 34px;
            height: 34px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }

        .chisel-tool.clicking {
            animation: chiselClick 0.28s ease-out;
        }

        @keyframes chiselClick {
            0% { transform: translateY(-50%) rotate(0deg); }
            30% { transform: translateY(-45%) rotate(-14deg); }
            60% { transform: translateY(-55%) rotate(6deg); }
            100% { transform: translateY(-50%) rotate(0deg); }
        }

        .chisel-hint {
            position: absolute;
            right: 6%;
            top: 34%;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.4s ease;
            writing-mode: vertical-rl;
            text-orientation: upright;
            z-index: 15;
        }

        .chisel-hint.visible {
            opacity: 0.82;
        }

        .furnace {
            width: 480px;
            max-width: 48vw;
            margin: 18px auto 0;
            display: block;
            z-index: 2;
            filter: brightness(0.95);
            transition: all 0.5s ease;
        }

        .furnace.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .furnace:hover {
            transform: scale(1.03);
        }

        .complete-overlay {
            position: absolute;
            inset: 0;
            background: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 20;
        }

        .complete-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .complete-text {
            font-size: 2rem;
            color: var(--gold);
            letter-spacing: 8px;
            margin-bottom: 18px;
        }

        .complete-sub {
            font-size: 1rem;
            color: #b8b8b8;
            letter-spacing: 2px;
        }

        .final-stage {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            z-index: 6;
            background: var(--bg);
        }

        .final-stage.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .final-stage iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: var(--bg);
        }

        .holes-layer {
            position: absolute;
            inset: 0;
            pointer-events: auto;
            z-index: 12;
        }

        .hole {
            position: absolute;
            width: var(--hole-size);
            height: var(--hole-size);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .hole.ink-mark {
            border: 2px dashed rgba(60, 50, 40, 0.8);
            background: rgba(40, 35, 30, 0.4);
            box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
        }

        .hole.ink-mark:hover {
            border-color: var(--gold-dim);
            background: rgba(201, 169, 110, 0.15);
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.3), inset 0 0 4px rgba(0,0,0,0.5);
        }

        .hole.drilled {
            background: radial-gradient(circle at 30% 30%, #2a1f15 0%, #1a120a 40%, #3d2818 70%, #5a3a20 100%);
            border: 1px solid #4a3020;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 6px rgba(90, 58, 32, 0.6);
        }

        .hole-label {
            position: absolute;
            font-size: 11px;
            color: var(--gold-dim);
            letter-spacing: 1px;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0.8;
        }

        .hole-1 { left: 12%; top: 48%; }
        .hole-2 { left: 22%; top: 48%; }
        .hole-3 { left: 38%; top: 48%; }
        .hole-4 { left: 48%; top: 48%; }
        .hole-5 { left: 58%; top: 48%; }
        .hole-6 { left: 68%; top: 48%; }
        .hole-7 { left: 78%; top: 48%; }
        .hole-8 { left: 88%; top: 48%; }

        .label-1 { left: 12%; top: 35%; }
        .label-2 { left: 22%; top: 35%; }
        .label-3 { left: 38%; top: 35%; }
        .label-4 { left: 48%; top: 35%; }
        .label-5 { left: 58%; top: 35%; }
        .label-6 { left: 68%; top: 35%; }
        .label-7 { left: 78%; top: 35%; }
        .label-8 { left: 88%; top: 35%; }

        .scale-overlay {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 80%;
            max-width: 700px;
            padding: 20px 30px;
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid var(--gold-dim);
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s ease;
            z-index: 8;
        }

        .scale-overlay.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .scale-title {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 12px;
        }

        .scale-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .scale-item {
            text-align: center;
        }

        .scale-note {
            font-size: 24px;
            color: var(--gold);
            font-family: "Noto Serif SC", serif;
        }

        .scale-name {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .scale-line {
            width: 1px;
            height: 30px;
            background: var(--gold-dim);
            opacity: 0.5;
        }

        .gongche-panel {
            position: absolute;
            right: 3%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 12;
            pointer-events: none;
        }

        .gongche-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .gongche-title {
            font-size: 12px;
            color: var(--gold-dim);
            letter-spacing: 4px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--gold-dim);
            padding-bottom: 10px;
        }

        .gongche-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .gongche-char {
            font-size: 22px;
            color: var(--gold);
            font-family: "Noto Serif SC", serif;
            writing-mode: vertical-rl;
            text-orientation: upright;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            padding: 4px 0;
            position: relative;
        }

        .gongche-char.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chip-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes chipFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .sound-wave {
            position: absolute;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes waveExpand {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.8; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        .node-clear-animation {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 3;
        }

        .node-clear-animation.active {
            display: block;
        }

        .clear-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
        }

        @keyframes clearBurst {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        @media (max-width: 768px) {
            .bamboo-selection {
                width: 94%;
                gap: 8px;
            }
            .bamboo-item { width: 28%; }
            .stage-text { top: 10%; font-size: 1rem; }
            .stage-sub { top: 16%; font-size: 0.85rem; }
            .chisel-tool { right: 4%; width: 60px; height: 60px; }
            .swipe-hint { left: 3%; }
            .progress-container { width: 78%; }
        }

        /* Final stage (4-试音) styles */
        #final-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 12;
        }

        #final-stage.visible {
            pointer-events: all;
        }

        #final-stage #final-bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2a2520 0%, #1a1a1a 70%);
            opacity: 0.6;
            pointer-events: none;
        }

        #final-stage .membrane-stage,
        #final-stage .play-stage {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }

        #final-stage .membrane-stage.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        #final-stage .membrane-title {
            position: absolute;
            top: 18%;
            font-size: 1.3rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
        }

        #final-stage .membrane-sub {
            position: absolute;
            top: 23%;
            font-size: 0.9rem;
            color: var(--gold-dim);
            letter-spacing: 2px;
        }

        #final-stage .membrane-options {
            display: flex;
            gap: 60px;
            margin-top: -5%;
        }

        #final-stage .membrane-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        #final-stage .membrane-item:hover {
            border-color: var(--gold-dim);
            background: rgba(201, 169, 110, 0.05);
            transform: translateY(-5px);
        }

        #final-stage .membrane-item.selected {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.1);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.2);
        }

        #final-stage .membrane-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--gold-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--gold);
            transition: all 0.4s ease;
        }

        #final-stage .membrane-item:hover .membrane-icon,
        #final-stage .membrane-item.selected .membrane-icon {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .membrane-name {
            font-size: 16px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        #final-stage .membrane-desc {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        #final-stage .confirm-btn {
            position: absolute;
            bottom: 20%;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid var(--gold-dim);
            color: var(--gold-dim);
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        #final-stage .confirm-btn.visible {
            opacity: 1;
            pointer-events: all;
        }

        #final-stage .confirm-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .play-stage {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        #final-stage .play-stage.visible {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        #final-stage .bamboo-container {
            position: relative;
            width: 70%;
            max-width: 900px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -5%;
        }

        #final-stage #final-bamboo-pipe {
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 5;
            filter: sepia(0.8) brightness(0.85) contrast(1.1);
            transition: filter 0.5s ease;
        }

        #final-stage #final-bamboo-pipe.glowing {
            filter: sepia(0.6) brightness(1.0) contrast(1.1);
            animation: pipeGlow 3s ease-in-out infinite;
        }

        #final-stage .holes-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        #final-stage .hole {
            position: absolute;
            width: var(--hole-size);
            height: var(--hole-size);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.15s ease;
        }

        #final-stage .hole.drilled {
            background: radial-gradient(circle at 30% 30%, #2a1f15 0%, #1a120a 40%, #3d2818 70%, #5a3a20 100%);
            border: 1px solid #4a3020;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 6px rgba(90, 58, 32, 0.6);
        }

        #final-stage .hole.active {
            box-shadow:
                inset 0 0 8px rgba(0,0,0,0.8),
                0 0 15px rgba(201, 169, 110, 0.8),
                0 0 30px rgba(201, 169, 110, 0.4);
            border-color: var(--gold);
        }

        #final-stage .hole.membrane-covered {
            background: radial-gradient(circle at 30% 30%, rgba(232, 213, 168, 0.3) 0%, rgba(201, 169, 110, 0.15) 50%, transparent 100%);
            box-shadow:
                inset 0 0 8px rgba(0,0,0,0.6),
                0 0 8px rgba(201, 169, 110, 0.3);
        }

        #final-stage .vibration {
            position: absolute;
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
        }

        @keyframes vibrate {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.6; }
            100% { width: 50px; height: 50px; opacity: 0; }
        }

        #final-stage .sound-wave {
            position: absolute;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes waveExpand {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.8; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        #final-stage .hint-1 { left: 38%; top: 62%; }
        #final-stage .hint-2 { left: 48%; top: 62%; }
        #final-stage .hint-3 { left: 58%; top: 62%; }
        #final-stage .hint-4 { left: 68%; top: 62%; }
        #final-stage .hint-5 { left: 78%; top: 62%; }
        #final-stage .hint-6 { left: 88%; top: 62%; }
        #final-stage .hint-7 { left: 12%; top: 62%; }

        #final-stage .key-hint {
            position: absolute;
            font-size: 10px;
            color: var(--gold-dim);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.6;
            transition: all 0.2s;
        }

        #final-stage .key-hint.active {
            color: var(--gold);
            opacity: 1;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(201, 169, 110, 0.5);
        }

        #final-stage .note-display {
            position: absolute;
            top: 18%;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 4px;
            font-family: "Noto Serif SC", serif;
            opacity: 0;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #final-stage .note-display.visible {
            opacity: 1;
        }

        #final-stage .note-name {
            font-size: 1rem;
            color: var(--gold-dim);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        #final-stage .stage-text {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--gold);
            opacity: 0.9;
            transition: all 0.5s ease;

        #final-stage .stage-text.sub {

        #final-stage .end-buttons {

    </style>
</head>

<script>
    const stageSelect = document.getElementById('select-stage');
    const stageBake = document.getElementById('bake-stage');
    const finalStage = document.getElementById('final-stage');
    const selectText = document.getElementById('select-text');
    const selectSub = document.getElementById('select-sub');
    const selectItems = document.querySelectorAll('.bamboo-item');
    const bambooSelection = document.getElementById('bamboo-selection');
    const bgLayer = document.getElementById('bg-layer');
    const navDots = document.querySelectorAll('.dot-wrapper');

    const bambooPipe = document.getElementById('bamboo-pipe');
    const bambooContainer = document.getElementById('bamboo-container');
    const swipeHint = document.getElementById('swipe-hint');
    const swipeCounter = document.getElementById('swipe-counter');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const steam = document.getElementById('steam');
    const mainText = document.getElementById('main-text');
    const subText = document.getElementById('sub-text');
    const chiselTool = document.getElementById('chisel-tool');
    const chiselHint = document.getElementById('chisel-hint');
    const clearAnimation = document.getElementById('clear-animation');
    const holesLayer = document.getElementById('holes-layer');
    const scaleOverlay = document.getElementById('scale-overlay');
    const gongchePanel = document.getElementById('gongche-panel');
    const gongcheChars = document.getElementById('gongche-chars');
    const completeOverlay = document.getElementById('complete-overlay');

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBakeSound() {
        if (!audioCtx) return;
        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
        noise.buffer = buffer;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        noise.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(90 + Math.random() * 40, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playChiselSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * 0.08;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2;
        noise.buffer = buffer;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        noise.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start();
    }

    function playDrillSound() {
        if (!audioCtx) return;
        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * 0.15;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.35;
        }
        noise.buffer = buffer;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        noise.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120 + Math.random() * 60, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playCompleteSound() {
        if (!audioCtx) return;
        const notes = [523.25, 659.25, 783.99];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
            gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.15 + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.8);
        });
    }

    function setNavStage(index) {
        navDots.forEach((dot, i) => {
            dot.classList.remove('active', 'completed');
            const circle = dot.querySelector('.dot');
            circle.classList.remove('active', 'completed');
            if (i < index) {
                dot.classList.add('completed');
                circle.classList.add('completed');
            } else if (i === index) {
                dot.classList.add('active');
                circle.classList.add('active');
            }
        });
    }

    function showBakeStage() {
        stageSelect.classList.add('hidden');
        stageBake.classList.remove('hidden');
        setNavStage(1);
        swipeHint.classList.remove('hidden');
        progressContainer.style.opacity = '0';
        swipeCounter.classList.remove('visible');
        bgLayer.style.transform = 'scale(1)';
        bambooSelection.style.transform = 'translateY(0) scale(1)';
        bambooOffset = 0;
        bambooPipe.style.setProperty('--bamboo-offset', '0px');
        mainText.innerText = '新竹砍下需要阴干2年以上';
        subText.innerText = '烘烤去湿可防止竹笛后期开裂';
        bambooPipe.classList.remove('baked', 'baking');
        clearClicks = 0;
        swipeCount = 0;
        updateSwipeCounter();
        progressBar.style.width = '0%';
        completeOverlay.classList.remove('active');
        chiselTool.classList.remove('active');
        chiselTool.style.display = 'flex';
        chiselHint.classList.remove('visible');
        chiselHint.style.display = 'block';
        holesLayer.style.display = 'none';
        holesLayer.querySelectorAll('.hole').forEach(hole => {
            hole.classList.remove('drilled');
            hole.classList.add('ink-mark');
        });
        gongchePanel.classList.remove('visible');
        scaleOverlay.classList.remove('visible');
        gongcheChars.innerHTML = '';
    }

    selectItems.forEach(item => {
        item.addEventListener('click', () => {
            const status = item.dataset.status;
            if (status === 'good') {
                item.classList.add('selected');
                selectText.innerText = '已选中好竹，进入下一步汗青工序';
                selectSub.innerText = '上下滑动烘烤竹管，准备打通内节';
                setTimeout(showBakeStage, 700);
                return;
            }
            selectText.innerText = '这根竹子不够理想，请继续选择。';
            item.classList.add('bad-click');
            setTimeout(() => item.classList.remove('bad-click'), 400);
        });
    });

    let selectProgress = 0;
    function handleSelectWheel(e) {
        if (stageSelect.classList.contains('hidden')) return;
        e.preventDefault();
        selectProgress += e.deltaY * 0.001;
        selectProgress = Math.max(0, Math.min(selectProgress, 2));
        bgLayer.style.transform = `scale(${1 + selectProgress * 0.18})`;
        bambooSelection.style.transform = `translateY(${-selectProgress * 16}px) scale(${1 + selectProgress * 0.02})`;
        if (selectProgress < 0.7) {
            selectText.innerText = '应取3年以上的老竹，直径2-3公分';
        } else if (selectProgress < 1.4) {
            selectText.innerText = '应取质地均匀、壁厚杆直、无虫蛀的竹材';
        } else {
            selectText.innerText = '选中优质竹材，准备进入阴干阶段';
        }
    }

    window.addEventListener('wheel', handleSelectWheel, { passive: false });

    function getY(e) {
        return e.touches ? e.touches[0].clientY : e.clientY;
    }

    let isDragging = false;
    let lastY = 0;
    let direction = 0;
    let lastDirection = 0;
    let swipeCount = 0;
    const TOTAL_SWIPES_NEEDED = 3;
    let phase = 'bake';
    let clearClicks = 0;
    const TOTAL_CLEAR_CLICKS = 3;
    let bambooOffset = 0;
    const MAX_BAMBOO_OFFSET = 28;
    const MIN_BAMBOO_OFFSET = -28;

    function handleStart(e) {
        if (phase !== 'bake') return;
        initAudio();
        isDragging = true;
        lastY = getY(e);
        direction = 0;
        lastDirection = 0;
        bambooPipe.classList.add('baking');
        steam.classList.add('active');
        progressContainer.style.opacity = '1';
        swipeCounter.classList.add('visible');
        bambooContainer.classList.add('grabbing');
    }

    function handleMove(e) {
        if (!isDragging || phase !== 'bake') return;
        e.preventDefault();
        const currentY = getY(e);
        const delta = currentY - lastY;
        if (Math.abs(delta) > 15) {
            const newDirection = delta > 0 ? 1 : -1;
            bambooOffset = Math.max(MIN_BAMBOO_OFFSET, Math.min(MAX_BAMBOO_OFFSET, bambooOffset + delta * 0.16));
            bambooPipe.style.setProperty('--bamboo-offset', `${bambooOffset}px`);
            if (lastDirection !== 0 && newDirection !== lastDirection) {
                swipeCount++;
                updateSwipeCounter();
                playBakeSound();
                const progress = Math.min((swipeCount / TOTAL_SWIPES_NEEDED) * 100, 100);
                progressBar.style.width = progress + '%';
                if (swipeCount === 1) {
                    mainText.innerText = '竹管受热，水分开始蒸发';
                } else if (swipeCount === 2) {
                    mainText.innerText = '色泽转深，竹质紧实';
                }
            }
            lastDirection = newDirection;
            lastY = currentY;
        }
        if (swipeCount >= TOTAL_SWIPES_NEEDED && phase === 'bake') {
            finishBaking();
        }
    }

    function handleEnd() {
        isDragging = false;
        bambooPipe.classList.remove('baking');
        steam.classList.remove('active');
        bambooContainer.classList.remove('grabbing');
    }

    function updateSwipeCounter() {
        for (let i = 1; i <= TOTAL_SWIPES_NEEDED; i++) {
            const dot = document.getElementById('dot-' + i);
            if (dot) dot.classList.toggle('active', i <= swipeCount);
        }
    }

    const furnace = document.querySelector('.furnace');

    function finishBaking() {
        phase = 'clear';
        bambooPipe.classList.add('baked');
        swipeHint.classList.add('hidden');
        swipeCounter.style.opacity = '0';
        progressContainer.style.opacity = '0';
        
        // 隐藏炉子
        furnace.classList.add('hidden');
        
        // 竹竿回到界面正中间且竖着
        bambooPipe.style.transform = 'translateX(-50%) translateY(0) scale(0.85) rotate(0deg)';
        bambooPipe.style.bottom = '25%';
        
        mainText.innerText = '烘烤完成，点击右侧凿子打通内节';
        subText.innerText = '通节修内是为了保证气流通畅，为开孔调音打下基础';
        chiselTool.classList.add('active');
        chiselHint.classList.add('visible');
        bambooPipe.style.animation = 'pulse 2s ease-in-out infinite';
    }

    function handleChiselClick(e) {
        if (phase !== 'clear' && phase !== 'clearing') return;
        e.preventDefault();
        e.stopPropagation();
        initAudio();
        phase = 'clearing';
        clearClicks++;
        chiselTool.classList.remove('clicking');
        void chiselTool.offsetWidth;
        chiselTool.classList.add('clicking');
        playChiselSound();
        bambooPipe.style.animation = 'shake 0.3s ease-in-out';
        setTimeout(() => {
            if (phase === 'clearing' || phase === 'clear') {
                bambooPipe.style.animation = 'pulse 2s ease-in-out infinite';
            }
        }, 300);
        const particles = clearAnimation.querySelectorAll('.clear-particle');
        particles.forEach((p, i) => {
            setTimeout(() => {
                p.style.animation = 'none';
                void p.offsetWidth;
                p.style.animation = 'clearBurst 0.5s ease-out forwards';
            }, i * 100);
        });
        clearAnimation.classList.add('active');
        setTimeout(() => clearAnimation.classList.remove('active'), 600);
        if (clearClicks === 1) {
            mainText.innerText = '凿子破节，竹屑纷飞';
        } else if (clearClicks === 2) {
            mainText.innerText = '内节渐通，气流将畅';
        }
        if (clearClicks >= TOTAL_CLEAR_CLICKS) {
            finishClearing();
        }
    }

    function finishClearing() {
        phase = 'done';
        chiselTool.classList.remove('active');
        chiselHint.classList.remove('visible');
        bambooPipe.style.animation = '';
        mainText.innerText = '内节已通，气流通畅';
        subText.innerText = '竹管内外壁已修整平滑';
        setTimeout(() => {
            playCompleteSound();
            completeOverlay.querySelector('.complete-text').innerText = '汗青完成';
            completeOverlay.querySelector('.complete-sub').innerText = '准备进入第三步：开孔';
            completeOverlay.classList.add('active');
            setTimeout(() => {
                completeOverlay.classList.remove('active');
                showDrillStage();
            }, 1400);
        }, 400);
    }

    function showDrillStage() {
        phase = 'drill';
        setNavStage(2);
        finalStage.classList.remove('visible');
        holesLayer.style.display = 'block';
        holesLayer.querySelectorAll('.hole').forEach(hole => {
            hole.classList.remove('drilled');
            hole.classList.add('ink-mark');
        });
        drilledCount = 0;
        gongcheChars.innerHTML = '';
        gongchePanel.classList.remove('visible');
        scaleOverlay.classList.remove('visible');
        mainText.innerText = '开孔工序开始';
        subText.innerText = '点击竹管上的墨线标记逐一开孔';
        completeOverlay.classList.remove('active');
        chiselTool.style.display = 'none';
        chiselHint.style.display = 'none';
        scaleOverlay.style.display = 'none';
        // 重置进度条，防止重复显示
        progressContainer.style.opacity = '0';
        progressBar.style.width = '0%';
    }

    function createChips(x, y) {
        const container = bambooContainer;
        for (let i = 0; i < 8; i++) {
            const chip = document.createElement('div');
            chip.className = 'chip-particle';
            chip.style.left = x + 'px';
            chip.style.top = y + 'px';
            const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
            const distance = 20 + Math.random() * 40;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            chip.style.setProperty('--tx', tx + 'px');
            chip.style.setProperty('--ty', ty + 'px');
            chip.style.animation = `chipFly 0.6s ease-out forwards`;
            chip.style.animationDelay = (Math.random() * 0.1) + 's';
            container.appendChild(chip);
            setTimeout(() => chip.remove(), 700);
        }
    }

    function createSoundWave(x, y) {
        const wave = document.createElement('div');
        wave.className = 'sound-wave';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        wave.style.transform = 'translate(-50%, -50%)';
        wave.style.animation = 'waveExpand 0.8s ease-out forwards';
        bambooContainer.appendChild(wave);
        setTimeout(() => wave.remove(), 800);
    }

    function addGongcheChar(note, name, tone) {
        const item = document.createElement('div');
        item.className = 'gongche-item';
        const char = document.createElement('div');
        char.className = 'gongche-char';
        char.textContent = note;
        item.appendChild(char);
        gongcheChars.appendChild(item);
        requestAnimationFrame(() => {
            char.classList.add('visible');
        });
    }

    function drillHole(hole) {
        if (phase !== 'drill' || hole.classList.contains('drilled')) return;
        initAudio();
        playDrillSound();
        hole.classList.remove('ink-mark');
        hole.classList.add('drilled');
        const rect = hole.getBoundingClientRect();
        const containerRect = bambooContainer.getBoundingClientRect();
        const x = rect.left - containerRect.left + rect.width / 2;
        const y = rect.top - containerRect.top + rect.height / 2;
        createChips(x, y);
        createSoundWave(x, y);
        const name = hole.dataset.name;
        const note = hole.dataset.note;
        const tone = hole.dataset.tone;
        drilledCount++;
        gongchePanel.classList.add('visible');
        addGongcheChar(note, name, tone);
        mainText.innerText = `已开${name}，对应工尺谱「${note}」，${tone}音`;
        const remaining = TOTAL_HOLES - drilledCount;
        subText.innerText = remaining > 0 ? `还差 ${remaining} 个孔位` : '七孔俱全，上应七星';
        if (drilledCount >= TOTAL_HOLES) {
            setTimeout(() => {
                playCompleteSound();
                completeOverlay.querySelector('.complete-text').innerText = '七孔俱全';
                completeOverlay.querySelector('.complete-sub').innerText = '笛开孔完成，进入最后试音步骤';
                completeOverlay.classList.add('active');
                setNavStage(3);
                setTimeout(showToneStage, 1200);
            }, 600);
        }
    }

    function showToneStage() {

        finalPlayStage.classList.remove('visible');

        chiselHint.style.display = 'none';
        setNavStage(3);

    const membraneTypes = {

        bamboo: { name: '竹膜',   brightness: 1.0, harmonic: [1, 0.5, 0.3, 0.15, 0.08], attack: 0.03, decay: 1.0 },
        paper:  { name: '纸膜',   brightness: 0.7, harmonic: [1, 0.4, 0.5, 0.3, 0.2], attack: 0.05, decay: 1.2 }
    };

    let currentMembrane = null;
    let selectedMembrane = null;

    const noteFingerings = {
        '1': { freq: 293.66, name: '低音5', holes: [true, true, true, true, true, true] },
        '2': { freq: 329.63, name: '低音6', holes: [true, true, true, true, false, false] },
        '3': { freq: 369.99, name: '低音7', holes: [true, true, true, false, false, false] },
        '4': { freq: 392.00, name: '中音1', holes: [true, true, false, false, false, false] },
        '5': { freq: 440.00, name: '中音2', holes: [true, false, false, false, false, false] },
        '6': { freq: 493.88, name: '中音3', holes: [false, false, false, false, false, false] },
        '7': { freq: 523.25, name: '中音4', holes: [false, false, false, false, false, false] }
    };

    const noteChars = {

        '2': '6',

    };

    const finalMembraneStage = document.getElementById('final-membrane-stage');
    const finalPlayStage = document.getElementById('final-play-stage');
    const finalMembraneItems = document.querySelectorAll('#final-membrane-stage .membrane-item');
    const finalConfirmBtn = document.getElementById('final-confirm-btn');
    const finalNoteDisplay = document.getElementById('final-note-display');
    const finalNoteChar = document.getElementById('final-note-char');
    const finalNoteName = document.getElementById('final-note-name');
    const finalBambooContainer = document.getElementById('final-bamboo-container');

    finalMembraneItems.forEach(item => {

        });

    finalConfirmBtn.addEventListener('click', () => {
        if (!selectedMembrane) return;
        initAudio();
        playMembraneSound();

        const membraneHole = document.getElementById('final-hole-2');
        membraneHole.classList.add('membrane-covered');
        createFinalVibration(membraneHole);
        finalMembraneStage.classList.add('hidden');
        setTimeout(() => {
            finalPlayStage.classList.add('visible');
            const params = membraneTypes[currentMembrane];
            finalMainText.innerText = `已贴${params.name}，${params.name === '芦苇膜' ? '清亮' : params.name === '竹膜' ? '温润' : '浑厚'}之声待君品鉴`;
            finalSubText.innerText = '按键盘数字键 1-7 吹奏音阶（筒音作5）';
            finalBambooPipe.classList.add('glowing');
        }, 400);
    });

    function playMembraneSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function createFinalVibration(hole) {
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const rect = hole.getBoundingClientRect();
                const containerRect = finalBambooContainer.getBoundingClientRect();
                const x = rect.left - containerRect.left + rect.width / 2;
                const y = rect.top - containerRect.top + rect.height / 2;
                const vib = document.createElement('div');
                vib.className = 'vibration';
                vib.style.left = x + 'px';
                vib.style.top = y + 'px';
                vib.style.transform = 'translate(-50%, -50%)';

                setTimeout(() => vib.remove(), 800);
            }, i * 300);
        }
    }

    const finalHoleElements = [
        document.getElementById('final-hole-3'),
        document.getElementById('final-hole-4'),
        document.getElementById('final-hole-5'),
        document.getElementById('final-hole-6'),
        document.getElementById('final-hole-7'),
        document.getElementById('final-hole-8')
    ];
    const finalHintElements = [
        document.querySelector('#final-stage .hint-1'),
        document.querySelector('#final-stage .hint-2'),
        document.querySelector('#final-stage .hint-3'),
        document.querySelector('#final-stage .hint-4'),
        document.querySelector('#final-stage .hint-5'),
        document.querySelector('#final-stage .hint-6')
    ];

    function playFluteNote(key) {
        const note = noteFingerings[key];
        if (!note || !currentMembrane) return;

        initAudio();
        const params = membraneTypes[currentMembrane];
        const baseFreq = note.freq * params.brightness;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = baseFreq;
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.2, now + params.attack);
        gain.gain.exponentialRampToValueAtTime(0.001, now + params.attack + params.decay);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + params.attack + params.decay + 0.1);

        params.harmonic.forEach((amp, i) => {
            if (amp < 0.05) return;
            const harmOsc = audioCtx.createOscillator();
            const harmGain = audioCtx.createGain();
            harmOsc.type = i % 2 === 0 ? 'sine' : 'triangle';
            harmOsc.frequency.value = baseFreq * (i + 2);
            harmGain.gain.setValueAtTime(0, now);
            harmGain.gain.linearRampToValueAtTime(amp * 0.08, now + params.attack);
            harmGain.gain.exponentialRampToValueAtTime(0.001, now + params.attack + params.decay * 0.7);
            harmOsc.connect(harmGain);
            harmGain.connect(audioCtx.destination);
            harmOsc.start(now);
            harmOsc.stop(now + params.attack + params.decay + 0.1);
        });

        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.02;
        }
        noise.buffer = buffer;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.01, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = baseFreq * 2;
        filter.Q.value = 5;
        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start(now);

        finalNoteChar.textContent = noteChars[key];
        finalNoteName.textContent = note.name;
        finalNoteDisplay.classList.add('visible');

        note.holes.forEach((closed, index) => {
            if (finalHoleElements[index]) {
                if (closed) {
                    finalHoleElements[index].classList.add('active');
                } else {
                    finalHoleElements[index].classList.remove('active');
                }
            }
            if (finalHintElements[index]) {
                finalHintElements[index].classList.toggle('active', !closed);
            }
        });

        document.getElementById('final-hole-1').classList.add('active');
        document.getElementById('final-hole-2').classList.add('active');
        const activeHoles = note.holes.map((closed, i) => closed ? finalHoleElements[i] : null).filter(Boolean);
        if (activeHoles.length > 0) {
            const centerHole = activeHoles[Math.floor(activeHoles.length / 2)];
            createFinalSoundWave(centerHole);
        }

        finalMainText.innerText = `吹奏「${note.name}」，指法已示于孔位`;
        finalPlayCount++;
        if (finalPlayCount >= PLAY_TO_END && !finalEndButtons.classList.contains('visible')) {
            finalEndButtons.classList.add('visible');
            finalSubText.innerText = '五音已备，可再次体验或向下浏览';
        }

        setTimeout(() => {
            finalNoteDisplay.classList.remove('visible');
            finalHoleElements.forEach(h => h.classList.remove('active'));
            finalHintElements.forEach(h => h.classList.remove('active'));
            document.getElementById('final-hole-1').classList.remove('active');
            document.getElementById('final-hole-2').classList.remove('active');
        }, 600);
    }

    function createFinalSoundWave(hole) {
        const rect = hole.getBoundingClientRect();
        const containerRect = finalBambooContainer.getBoundingClientRect();
        const x = rect.left - containerRect.left + rect.width / 2;
        const y = rect.top - containerRect.top + rect.height / 2;
        const wave = document.createElement('div');
        wave.className = 'sound-wave';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        wave.style.transform = 'translate(-50%, -50%)';
        wave.style.animation = 'waveExpand 0.8s ease-out forwards';
        finalBambooContainer.appendChild(wave);
        setTimeout(() => wave.remove(), 800);
    }

    document.addEventListener('keydown', (e) => {
        if (!finalPlayStage.classList.contains('visible')) return;
        if (e.repeat) return;
        const key = e.key;
        if (noteFingerings[key]) {
            e.preventDefault();
            playFluteNote(key);
        }
    });

    const finalPlayHoles = [
        document.getElementById('final-hole-3'),
        document.getElementById('final-hole-4'),
        document.getElementById('final-hole-5'),
        document.getElementById('final-hole-6'),
        document.getElementById('final-hole-7'),
        document.getElementById('final-hole-8')
    ];

    finalPlayHoles.forEach((hole, index) => {
        if (!hole) return;
        hole.addEventListener('click', () => {
            if (!finalPlayStage.classList.contains('visible')) return;
            const key = String(index + 1);
            if (noteFingerings[key]) playFluteNote(key);
        });
        hole.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!finalPlayStage.classList.contains('visible')) return;
            const key = String(index + 1);
            if (noteFingerings[key]) playFluteNote(key);
        });
    });

    finalRestartBtn.addEventListener('click', () => {
        location.reload();
    });

    finalArrowBtn.addEventListener('click', () => {
        window.location.href = '../../index.html?instrument=%E7%AC%9B';
    });

    const holes = holesLayer.querySelectorAll('.hole');
    const TOTAL_HOLES = 8;
    let drilledCount = 0;

    holes.forEach(hole => {
        hole.addEventListener('click', (e) => {
            e.stopPropagation();
            drillHole(hole);
        });
        hole.addEventListener('touchend', (e) => {
            e.preventDefault();
            e.stopPropagation();
            drillHole(hole);
        });
    });

    console.log('开孔工序已就绪 - 点击墨线标记处开孔');

    stageBake.addEventListener('mousedown', handleStart);
    stageBake.addEventListener('mousemove', handleMove);
    stageBake.addEventListener('mouseup', handleEnd);
    stageBake.addEventListener('mouseleave', handleEnd);
    stageBake.addEventListener('touchstart', handleStart, { passive: false });
    stageBake.addEventListener('touchmove', handleMove, { passive: false });
    stageBake.addEventListener('touchend', handleEnd);

    chiselTool.addEventListener('click', handleChiselClick);
    chiselTool.addEventListener('touchend', function(e) {
        e.preventDefault();
        handleChiselClick(e);
    });

    const style = document.createElement('style');
    style.textContent = `
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    `;
    document.head.appendChild(style);
</script>
