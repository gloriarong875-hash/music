<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笛韵千年——试音</title>
    <style>
        :root {
            --gold: #c9a96e;
            --gold-dim: #8a7a5a;
            --brown: #5a4a3a;
            --bg: #1a1a1a;
            --hole-size: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景层 */
        #bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2a2520 0%, #1a1a1a 70%);
            opacity: 0.6;
        }

        /* 进度导航点 */
        .nav-dots {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        .dot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #444;
            border: 2px solid #555;
            transition: all 0.5s ease;
        }

        .dot.completed {
            background: var(--gold-dim);
            border-color: var(--gold-dim);
        }

        .dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201, 169, 110, 0.5);
        }

        .dot-label {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            transition: all 0.5s ease;
        }

        .dot-wrapper.completed .dot-label {
            color: var(--gold-dim);
        }

        .dot-wrapper.active .dot-label {
            color: var(--gold);
        }

        /* 主内容区 */
        #stage-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ==================== 贴膜阶段 ==================== */
        .membrane-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }

        .membrane-stage.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .membrane-title {
            position: absolute;
            top: 18%;
            font-size: 1.3rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
        }

        .membrane-sub {
            position: absolute;
            top: 23%;
            font-size: 0.9rem;
            color: var(--gold-dim);
            letter-spacing: 2px;
        }

        /* 膜材选项区 */
        .membrane-options {
            display: flex;
            gap: 60px;
            margin-top: -5%;
        }

        .membrane-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        .membrane-item:hover {
            border-color: var(--gold-dim);
            background: rgba(201, 169, 110, 0.05);
            transform: translateY(-5px);
        }

        .membrane-item.selected {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.1);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.2);
        }

        .membrane-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--gold-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--gold);
            transition: all 0.4s ease;
        }

        .membrane-item:hover .membrane-icon {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        .membrane-item.selected .membrane-icon {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.15);
        }

        .membrane-name {
            font-size: 16px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .membrane-desc {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        /* 贴膜确认按钮 */
        .confirm-btn {
            position: absolute;
            bottom: 20%;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid var(--gold-dim);
            color: var(--gold-dim);
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .confirm-btn.visible {
            opacity: 1;
            pointer-events: all;
        }

        .confirm-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        /* ==================== 试音阶段 ==================== */
        .play-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
            transform: scale(1.05);
            z-index: 4;
        }

        .play-stage.visible {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        /* 竹管容器 */
        .bamboo-container {
            position: relative;
            width: 70%;
            max-width: 900px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -5%;
        }

        #bamboo-pipe {
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 5;
            filter: sepia(0.8) brightness(0.85) contrast(1.1);
            transition: filter 0.5s ease;
        }

        #bamboo-pipe.glowing {
            filter: sepia(0.6) brightness(1.0) contrast(1.1);
            animation: pipeGlow 3s ease-in-out infinite;
        }

        @keyframes pipeGlow {
            0%, 100% { filter: sepia(0.6) brightness(1.0) contrast(1.1) drop-shadow(0 0 5px rgba(201, 169, 110, 0.2)); }
            50% { filter: sepia(0.6) brightness(1.05) contrast(1.1) drop-shadow(0 0 20px rgba(201, 169, 110, 0.4)); }
        }

        /* 孔位层 */
        .holes-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        .hole {
            position: absolute;
            width: var(--hole-size);
            height: var(--hole-size);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.15s ease;
        }

        /* 已开孔样式 */
        .hole.drilled {
            background: radial-gradient(circle at 30% 30%, #2a1f15 0%, #1a120a 40%, #3d2818 70%, #5a3a20 100%);
            border: 1px solid #4a3020;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 6px rgba(90, 58, 32, 0.6);
        }

        /* 孔位亮起 - 吹奏时 */
        .hole.active {
            box-shadow: 
                inset 0 0 8px rgba(0,0,0,0.8),
                0 0 15px rgba(201, 169, 110, 0.8),
                0 0 30px rgba(201, 169, 110, 0.4);
            border-color: var(--gold);
        }

        /* 膜孔贴膜 */
        .hole.membrane-covered {
            background: radial-gradient(circle at 30% 30%, rgba(232, 213, 168, 0.3) 0%, rgba(201, 169, 110, 0.15) 50%, transparent 100%);
            box-shadow: 
                inset 0 0 8px rgba(0,0,0,0.6),
                0 0 8px rgba(201, 169, 110, 0.3);
        }

        /* 震颤波纹 */
        .vibration {
            position: absolute;
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
        }

        @keyframes vibrate {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.6; }
            100% { width: 50px; height: 50px; opacity: 0; }
        }

        /* 音波光波 */
        .sound-wave {
            position: absolute;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes waveExpand {
            0% { width: var(--hole-size); height: var(--hole-size); opacity: 0.8; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        /* 
         * 孔位位置定义 - 与第三步一致
         */
        .hole-1 { left: 12%; top: 48%; }   /* 吹孔 */
        .hole-2 { left: 22%; top: 48%; }   /* 膜孔 */
        .hole-3 { left: 38%; top: 48%; }   /* 第一音孔 */
        .hole-4 { left: 48%; top: 48%; }   /* 第二音孔 */
        .hole-5 { left: 58%; top: 48%; }   /* 第三音孔 */
        .hole-6 { left: 68%; top: 48%; }   /* 第四音孔 */
        .hole-7 { left: 78%; top: 48%; }   /* 第五音孔 */
        .hole-8 { left: 88%; top: 48%; }   /* 第六音孔 */

        /* 按键提示 */
        .key-hint {
            position: absolute;
            font-size: 10px;
            color: var(--gold-dim);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .key-hint.active {
            color: var(--gold);
            opacity: 1;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(201, 169, 110, 0.5);
        }

        .hint-1 { left: 38%; top: 62%; }
        .hint-2 { left: 48%; top: 62%; }
        .hint-3 { left: 58%; top: 62%; }
        .hint-4 { left: 68%; top: 62%; }
        .hint-5 { left: 78%; top: 62%; }
        .hint-6 { left: 88%; top: 62%; }
        .hint-7 { left: 12%; top: 62%; }   /* 筒音=全按 */

        /* 当前音阶显示 */
        .note-display {
            position: absolute;
            top: 18%;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 4px;
            font-family: "Noto Serif SC", serif;
            opacity: 0;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        .note-display.visible {
            opacity: 1;
        }

        .note-name {
            font-size: 1rem;
            color: var(--gold-dim);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* 底部提示 */
        .stage-text {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--gold);
            opacity: 0.9;
            transition: all 0.5s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .stage-text.sub {
            font-size: 0.9rem;
            color: var(--gold-dim);
            bottom: 11%;
            letter-spacing: 2px;
        }

        /* 终局按钮 */
        .end-buttons {
            position: absolute;
            bottom: 22%;
            display: flex;
            gap: 40px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s ease;
        }

        .end-buttons.visible {
            opacity: 1;
            pointer-events: all;
        }

        .end-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--gold-dim);
            background: transparent;
            color: var(--gold);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        .end-btn:hover {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(201, 169, 110, 0.4);
            transform: scale(1.1);
        }

        .end-btn.restart {
            font-size: 12px;
            writing-mode: horizontal-tb;
            padding: 0 8px;
            text-align: center;
            line-height: 1.3;
        }

        .end-btn.arrow {
            font-size: 24px;
        }

        /* 触摸设备适配 */
        @media (max-width: 768px) {
            .membrane-options {
                gap: 30px;
                flex-direction: column;
            }
            .membrane-icon {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }
            .bamboo-container {
                width: 95%;
            }
            .hole {
                width: 24px;
                height: 24px;
            }
            .note-display {
                font-size: 2rem;
            }
            .stage-text {
                font-size: 0.9rem;
                padding: 0 20px;
            }
            .end-btn {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<!-- 进度导航 -->
<div class="nav-dots">
    <div class="dot-wrapper completed">
        <div class="dot completed"></div>
        <div class="dot-label">择竹</div>
    </div>
    <div class="dot-wrapper completed">
        <div class="dot completed"></div>
        <div class="dot-label">汗青</div>
    </div>
    <div class="dot-wrapper completed">
        <div class="dot completed"></div>
        <div class="dot-label">开孔</div>
    </div>
    <div class="dot-wrapper active">
        <div class="dot active"></div>
        <div class="dot-label">试音</div>
    </div>
</div>

<!-- ==================== 贴膜阶段 ==================== -->
<div class="membrane-stage" id="membrane-stage">
    <div class="membrane-title">笛膜为魂，采芦苇内膜，薄如蝉翼，透似轻纱</div>
    <div class="membrane-sub">请选择膜材，贴于膜孔之上</div>

    <div class="membrane-options">
        <div class="membrane-item" data-type="reed" data-desc="清亮高亢">
            <div class="membrane-icon">苇</div>
            <div class="membrane-name">芦苇膜</div>
            <div class="membrane-desc">音色清亮</div>
        </div>
        <div class="membrane-item" data-type="bamboo" data-desc="温润醇厚">
            <div class="membrane-icon">竹</div>
            <div class="membrane-name">竹膜</div>
            <div class="membrane-desc">音色温润</div>
        </div>
        <div class="membrane-item" data-type="paper" data-desc="浑厚低沉">
            <div class="membrane-icon">纸</div>
            <div class="membrane-name">纸膜</div>
            <div class="membrane-desc">音色浑厚</div>
        </div>
    </div>

    <button class="confirm-btn" id="confirm-btn">确认贴膜</button>
</div>

<!-- ==================== 试音阶段 ==================== -->
<div class="play-stage" id="play-stage">
    <div class="note-display" id="note-display">
        <div id="note-char"></div>
        <div class="note-name" id="note-name"></div>
    </div>

    <div class="bamboo-container" id="bamboo-container">
        <img id="bamboo-pipe" src="图片/干.png" alt="竹管">

        <div class="holes-layer" id="holes-layer">
            <!-- 吹孔 -->
            <div class="hole drilled hole-1" id="hole-1"></div>
            <!-- 膜孔 -->
            <div class="hole drilled hole-2" id="hole-2"></div>
            <!-- 六个音孔 -->
            <div class="hole drilled hole-3" id="hole-3"></div>
            <div class="hole drilled hole-4" id="hole-4"></div>
            <div class="hole drilled hole-5" id="hole-5"></div>
            <div class="hole drilled hole-6" id="hole-6"></div>
            <div class="hole drilled hole-7" id="hole-7"></div>
            <div class="hole drilled hole-8" id="hole-8"></div>

            <!-- 按键提示 -->
            <div class="key-hint hint-1">1</div>
            <div class="key-hint hint-2">2</div>
            <div class="key-hint hint-3">3</div>
            <div class="key-hint hint-4">4</div>
            <div class="key-hint hint-5">5</div>
            <div class="key-hint hint-6">6</div>
            <div class="key-hint hint-7">7</div>
        </div>
    </div>
</div>

<!-- 底部提示 -->
<div class="stage-text" id="main-text">笛开七孔，上应七星。五声二变，清浊自辨</div>
<div class="stage-text sub" id="sub-text">按键盘数字键 1-7 吹奏音阶</div>

<!-- 终局按钮 -->
<div class="end-buttons" id="end-buttons">
    <button class="end-btn restart" id="restart-btn" title="再次体验">再次<br>体验</button>
    <button class="end-btn arrow" id="arrow-btn" title="向下">↓</button>
</div>

<script>
    // ===================== 音频系统 =====================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 膜材音色参数
    const membraneTypes = {
        reed:   { name: '芦苇膜', brightness: 1.3, harmonic: [1, 0.6, 0.4, 0.2, 0.1], attack: 0.02, decay: 0.8 },
        bamboo: { name: '竹膜',   brightness: 1.0, harmonic: [1, 0.5, 0.3, 0.15, 0.08], attack: 0.03, decay: 1.0 },
        paper:  { name: '纸膜',   brightness: 0.7, harmonic: [1, 0.4, 0.5, 0.3, 0.2], attack: 0.05, decay: 1.2 }
    };

    let currentMembrane = null;

    // 筒音作5 - 音阶频率映射
    // 1=全按(筒音5), 2=放一孔(6), 3=放二孔(7), 4=放三孔(1), 5=放四孔(2), 6=放五孔(3), 7=放六孔(4)
    // 对应指法：哪些孔需要按住（true=按住/关闭，false=放开/打开）
    const noteFingerings = {
        '1': { freq: 293.66,  name: '低音5', holes: [true,  true,  true,  true,  true,  true]  }, // 筒音 - 全按
        '2': { freq: 329.63,  name: '低音6', holes: [true,  true,  true,  true,  true,  false] }, // 放一孔
        '3': { freq: 369.99,  name: '低音7', holes: [true,  true,  true,  true,  false, false] }, // 放二孔
        '4': { freq: 392.00,  name: '中音1', holes: [true,  true,  true,  false, false, false] }, // 放三孔
        '5': { freq: 440.00,  name: '中音2', holes: [true,  true,  false, false, false, false] }, // 放四孔
        '6': { freq: 493.88,  name: '中音3', holes: [true,  false, false, false, false, false] }, // 放五孔
        '7': { freq: 523.25,  name: '中音4', holes: [false, false, false, false, false, false] }  // 全放
    };

    // 合成竹笛音色
    function playFluteNote(key) {
        if (!audioCtx || !currentMembrane) return;

        const note = noteFingerings[key];
        if (!note) return;

        const params = membraneTypes[currentMembrane];
        const baseFreq = note.freq * params.brightness;

        // 主音
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.value = baseFreq;

        // ADSR
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.2, now + params.attack);
        gain.gain.exponentialRampToValueAtTime(0.001, now + params.attack + params.decay);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + params.attack + params.decay + 0.1);

        // 谐波叠加
        params.harmonic.forEach((amp, i) => {
            if (amp < 0.05) return;
            const harmOsc = audioCtx.createOscillator();
            const harmGain = audioCtx.createGain();

            harmOsc.type = i % 2 === 0 ? 'sine' : 'triangle';
            harmOsc.frequency.value = baseFreq * (i + 2);

            harmGain.gain.setValueAtTime(0, now);
            harmGain.gain.linearRampToValueAtTime(amp * 0.08, now + params.attack);
            harmGain.gain.exponentialRampToValueAtTime(0.001, now + params.attack + params.decay * 0.7);

            harmOsc.connect(harmGain);
            harmGain.connect(audioCtx.destination);
            harmOsc.start(now);
            harmOsc.stop(now + params.attack + params.decay + 0.1);
        });

        // 噪声（气声）
        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.02;
        }
        noise.buffer = buffer;

        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.01, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

        // 滤波器
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = baseFreq * 2;
        filter.Q.value = 5;

        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start(now);
    }

    // 贴膜音效
    function playMembraneSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);

        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // ===================== 贴膜阶段 =====================
    const membraneStage = document.getElementById('membrane-stage');
    const playStage = document.getElementById('play-stage');
    const membraneItems = document.querySelectorAll('.membrane-item');
    const confirmBtn = document.getElementById('confirm-btn');
    const mainText = document.getElementById('main-text');
    const subText = document.getElementById('sub-text');

    let selectedMembrane = null;

    membraneItems.forEach(item => {
        item.addEventListener('click', () => {
            initAudio();

            membraneItems.forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            selectedMembrane = item.dataset.type;

            confirmBtn.classList.add('visible');

            const name = item.querySelector('.membrane-name').textContent;
            const desc = item.dataset.desc;
            mainText.innerText = `已选${name}，音色${desc}`;
            subText.innerText = '点击确认贴膜，进入试音';
        });
    });

    confirmBtn.addEventListener('click', () => {
        if (!selectedMembrane) return;
        initAudio();
        playMembraneSound();

        currentMembrane = selectedMembrane;

        // 膜孔贴膜动画
        const membraneHole = document.getElementById('hole-2');
        membraneHole.classList.add('membrane-covered');

        // 创建震颤波纹
        createVibration(membraneHole);

        // 切换阶段
        membraneStage.classList.add('hidden');
        setTimeout(() => {
            playStage.classList.add('visible');

            const params = membraneTypes[currentMembrane];
            mainText.innerText = `已贴${params.name}，${params.name === '芦苇膜' ? '清亮' : params.name === '竹膜' ? '温润' : '浑厚'}之声待君品鉴`;
            subText.innerText = '按键盘数字键 1-7 吹奏音阶（筒音作5）';

            // 笛身光晕
            document.getElementById('bamboo-pipe').classList.add('glowing');
        }, 400);
    });

    // 震颤波纹
    function createVibration(hole) {
        const container = document.getElementById('bamboo-container');
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const rect = hole.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const x = rect.left - containerRect.left + rect.width / 2;
                const y = rect.top - containerRect.top + rect.height / 2;

                const vib = document.createElement('div');
                vib.className = 'vibration';
                vib.style.left = x + 'px';
                vib.style.top = y + 'px';
                vib.style.transform = 'translate(-50%, -50%)';
                vib.style.animation = 'vibrate 0.8s ease-out forwards';

                container.appendChild(vib);
                setTimeout(() => vib.remove(), 800);
            }, i * 300);
        }
    }

    // ===================== 试音阶段 =====================
    const noteDisplay = document.getElementById('note-display');
    const noteChar = document.getElementById('note-char');
    const noteName = document.getElementById('note-name');
    const endButtons = document.getElementById('end-buttons');

    // 音阶字符映射
    const noteChars = {
        '1': '5',
        '2': '6', 
        '3': '7',
        '4': '1',
        '5': '2',
        '6': '3',
        '7': '4'
    };

    // 音孔DOM引用
    const holeElements = [
        document.getElementById('hole-3'),
        document.getElementById('hole-4'),
        document.getElementById('hole-5'),
        document.getElementById('hole-6'),
        document.getElementById('hole-7'),
        document.getElementById('hole-8')
    ];

    const hintElements = [
        document.querySelector('.hint-1'),
        document.querySelector('.hint-2'),
        document.querySelector('.hint-3'),
        document.querySelector('.hint-4'),
        document.querySelector('.hint-5'),
        document.querySelector('.hint-6')
    ];

    let playCount = 0;
    const PLAY_TO_END = 5; // 吹奏5次后显示终局按钮

    function playNote(key) {
        const note = noteFingerings[key];
        if (!note) return;

        initAudio();
        playFluteNote(key);

        // 显示音阶
        noteChar.textContent = noteChars[key];
        noteName.textContent = note.name;
        noteDisplay.classList.add('visible');

        // 高亮对应孔位
        note.holes.forEach((closed, index) => {
            if (holeElements[index]) {
                if (closed) {
                    holeElements[index].classList.add('active');
                } else {
                    holeElements[index].classList.remove('active');
                }
            }
            if (hintElements[index]) {
                hintElements[index].classList.toggle('active', !closed);
            }
        });

        // 吹孔和膜孔也亮起
        document.getElementById('hole-1').classList.add('active');
        document.getElementById('hole-2').classList.add('active');

        // 光波效果
        const activeHoles = note.holes.map((closed, i) => closed ? holeElements[i] : null).filter(Boolean);
        if (activeHoles.length > 0) {
            const centerHole = activeHoles[Math.floor(activeHoles.length / 2)];
            createSoundWave(centerHole);
        }

        // 更新提示
        mainText.innerText = `吹奏「${note.name}」，指法已示于孔位`;

        // 计数
        playCount++;
        if (playCount >= PLAY_TO_END && !endButtons.classList.contains('visible')) {
            endButtons.classList.add('visible');
            subText.innerText = '五音已备，可再次体验或向下浏览';
        }

        // 自动清除显示
        setTimeout(() => {
            noteDisplay.classList.remove('visible');
            holeElements.forEach(h => h.classList.remove('active'));
            hintElements.forEach(h => h.classList.remove('active'));
            document.getElementById('hole-1').classList.remove('active');
            document.getElementById('hole-2').classList.remove('active');
        }, 600);
    }

    // 光波效果
    function createSoundWave(hole) {
        const container = document.getElementById('bamboo-container');
        const rect = hole.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        const x = rect.left - containerRect.left + rect.width / 2;
        const y = rect.top - containerRect.top + rect.height / 2;

        const wave = document.createElement('div');
        wave.className = 'sound-wave';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        wave.style.transform = 'translate(-50%, -50%)';
        wave.style.animation = 'waveExpand 0.8s ease-out forwards';

        container.appendChild(wave);
        setTimeout(() => wave.remove(), 800);
    }

    // 键盘事件
    document.addEventListener('keydown', (e) => {
        if (!playStage.classList.contains('visible')) return;
        if (e.repeat) return;

        const key = e.key;
        if (noteFingerings[key]) {
            e.preventDefault();
            playNote(key);
        }
    });

    // 触摸点击孔位发声（移动端适配）
    holeElements.forEach((hole, index) => {
        hole.addEventListener('click', () => {
            if (!playStage.classList.contains('visible')) return;
            // 点击第i个音孔 = 放开前i个孔
            const key = String(index + 1);
            if (noteFingerings[key]) {
                playNote(key);
            }
        });

        hole.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!playStage.classList.contains('visible')) return;
            const key = String(index + 1);
            if (noteFingerings[key]) {
                playNote(key);
            }
        });
    });

    // ===================== 终局按钮 =====================
    const restartBtn = document.getElementById('restart-btn');
    const arrowBtn = document.getElementById('arrow-btn');

    restartBtn.addEventListener('click', () => {
        if (window !== window.parent) {
            window.parent.location.reload();
        } else {
            window.location.reload();
        }
    });

    arrowBtn.addEventListener('click', () => {
        // 预留：跳转后续页面
        mainText.innerText = '后续内容即将呈现';
        subText.innerText = '敬请期待';
    });

    console.log('试音工序已就绪 - 请先选择膜材');
</script>

</body>
</html>
